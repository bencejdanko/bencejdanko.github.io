\\ntitle: \\"Bert-TweetEval: Natural Language Emotion Classification\\"\\ndescription: \\"Bidirectional Encoder Representations from Transformers (BERT) are an encoder-transformer based architecture that is more suitable for some transformer tasks, such as classifying natural language.\\"\\npubDate: 2026-03-05 3:00 PM\\nauthors: [\\"bence-danko\\"]\\ntags: [Natural Language Processing]\\npdf: true\\ntemplate: ieee-conference\\nindexTerms: [\\"Emotion analysis\\", \\"natural language understanding\\", \\"transformer\\", \\"DistilBERT\\", \\"RoBERTa\\", \\"tokenizer\\"]\\nappendices: [\\"minimal-prompt\\", 'structured-prompt', 'confusion-matrices', 'bert-tweeteval-screenshots', 'missclassfied-base-models', 'missclassfied-tuned-models', 'bert-tweeteval-loss']\\ntab: reports\\ntoc: true\\n---\\n\\n## Abstract\\n\\nExtracting sentiment and intent from human natural language holds immense value in strategic decision-making in many domains. A variety of transformer architectures and base models have emerged as notable language processors, but they vary widely in training scale, vocabulary, and parametric counts. In real-world deployment, models can be hindered due to their cost and latency constraints. Models deployed to production are also subject to real-world stress cases, such as lexical diversity, unknown symbols and vocabulary, and dataset imbalance from the training data. In this work, we analyze lightweight variants of base and fine-tuned Bidirectional Encoder Representations from Transformers (BERT) models performance on the TweetEval emotion classification task. We compare and train DistilBERT and DistilRoBERTa variants and the suitability of their tokenizer architectures (WordPiece, BPE) for the emotion classification domain and their impact on performance. We construct a framework to stress-test distribution shifts and corrupted inputs, and conduct structured error analysis and interpret model confidence and calibration. We also benchmark additional competitive LLM models, Qwen3-4B-Instruct-2507 and GPT 4o-mini, under consistent prompting strategies on the same classification task. All code is released to the public at https://github.com/bencejdanko/bert-tweeteval. Models are released to the public at https://huggingface.co/bdanko.\\n\\n## Introduction and Related Work {#sec:intro}\\n \\nTweetEval [@barbieri2020tweetevalunifiedbenchmarkcomparative] consists of seven Twitter-specific classification tasks, including emoji prediction, emotion recognition, hate speech detection, irony detection, offensive language identification, sentiment analysis, and stance detection. TweetEval and BERT-variant combinations have already been extensively explored. BERTweet [@nguyen-etal-2020-bertweet], a prior RoBERTa-based model trained on a corpus of 850 million English tweets, established the state-of-the-art (SOTA) baseline across most of TweetEval's subtasks and proved the value in domain-specific pre-training, outperforming the original BERT and RoBERTa. TimeLMs [@loureiro2022timelmsdiachroniclanguagemodels] later introduced models continuously trained on fresh Twitter data, outperforming BERTweet in all TweetEval domains except irony detection. SuperTweetEval [@antypas2023supertweetevalchallengingunifiedheterogeneous] has also been since released, adding several more NLP task domains that TweetEval lacked.\\n\\n## Task Description\\n\\nIn this work, we will be targeting emotion classification task from the original TweetEval. Each sample is labeled with one of 4 classes: \\"anger\\", \\"sadness\\", \\"joy\\", or \\"optimism\\". The dataset is heavily imbalanced, with an overrepresentation of \\"anger\\" classes at 42.98% of the dataset, and underrepresentation of \\"optimism\\" at 9.03%, while joy and sadness sit at 21.74% and 26.25% respectively. In total, we have a training and validation set of sizes 3257 and 374. We test our results on 1421 samples.\\n\\nWe compare models across these key metrics:\\n\\n- **Accuracy**: Number of overall correct classifications over the validation sample.\\n- **Macro F1**: Macro F1 is the arithmetic mean of the F1 scores calculated for each individual class. It treats all classes equally, regardless of how many samples each class contains, meaning unbalanced classes are given the same weight:\\n\\n\$\$\\n\\\\text{Macro F1} = \\\\frac{1}{n} \\\\sum_{i=1}^{n} F1_{i}\\n\$\$\\n\\n- **Precision**: Number of true positives calculated over all classifications marked as positives. Measures the quality of a positive prediction. We are taking the macro average.\\n- **Recall**: The true positive rate. Out of all positive cases in the data, how many can the classifier identify. We are taking the macro average.\\n- **ms/100 samples**: Test of throughput. We test this by running evaluation inference in batches of 100 on all our models, except for GPT 4o-mini, in which we instead wall-clock for 100 async API requests (up to 20 concurrent).\\n- **Expected Calibration Error (ECE)**: A measure of how well a model's confidence aligns with its actual accuracy. If a model assigns a probability of 0.90 to a prediction, it should be correct 90% of the time. This tests for overconfident or underconfident models, and typically an ECE score of 0.01 or 0.02 is considered reliable.\\n\\nTo ensure reproducability, we set all configurable seeds to 15179996. No further data processing was done. For example, in future work, it would be possible to experiment with NLP augmentation techniques like Easy Data Augmentation (EDA) [@wei2019edaeasydataaugmentation], back-translation[@edunov2018understandingbacktranslationscale], random masking or MixUp [@sun2020mixuptransformerdynamicdataaugmentation] and variants. However, these are currently out of scope for our tasks, so we will omit them. All local tests were done evaluated using the NVIDIA L4 GPU as hardware.\\n\\n## Summarized Results\\n\\nTable: Evaluation Reference {#tbl:evaluation} [!h]\\n| Question | Location |\\n| --- | --- |\\n| Part A â Zero-Shot Baseline | Final Results at Table \\\\ref{tbl:results} |\\n| Part B â Fine-Tuning Transformers | Final Results at Table \\\\ref{tbl:results}.|\\n|  | Training strategy located at Section \\\\ref{sec:training-strategy}. |\\n|  | Loss curves and explanation at Appendix \\\\ref{sec:bert-tweeteval-loss} |\\n|  | Deployment Stress tests at Section \\\\ref{sec:stress-tests} |\\n| Part C â Error Analysis  | Error Analysis at Section \\\\ref{sec:error-analysis} |\\n| Part D â LLMs | Minimal Prompt at Appendix \\\\ref{sec:minimal-prompt} |\\n| | Strucured Prompt at Appendix \\\\ref{sec:structured-prompt} | \\n| | Final Results at Table \\\\ref{tbl:results} |\\n| | Prompt Explanation at Section \\\\ref{sec:prompt} |\\n| Other Requirements | Summary of hyperparameters at Section \\\\ref{sec:training-strategy}. |\\n| | Final output table at Table \\\\ref{tbl:results} |\\n| | Training screenshots located at Appendix \\\\ref{sec:bert-tweeteval-screenshots} |\\n| | Confusion matrices located at Appendix \\\\ref{sec:confusion-matrices} |\\n\\n: A reference guide for evaluators\\n\\nIn our studies, we reaffirmed that domain specific pre-training provides BERT models state of the art results on NLP classification tasks. We also demonstrate the arising competitive performance of open-source decoder models against closed-source.\\n\\nTable: Summarized Results from TweetEval Emotion Classification {#tbl:results} [!t*]\\n| Model | Accuracy | Macro F | Macro Precision | Macro Recall | ms/100 samples | ECE |\\n| --- | --- | --- | --- | --- | --- | --- |\\n| DistilBERT (WordPiece) | 0.083744 | 0.064219 | 0.384379 | 0.192035 | 312.318607 | 0.167510 |\\n| DistilRoBERTa (BPE) | 0.217452 | 0.155317 | 0.177579 | 0.200315 | **299.071175** | 0.056845 |\\n| bdanko/bert-tweeteval-distilbert | 0.79803 | 0.761196 | 0.767879 | 0.756296 |  | 0.0364 |\\n| bdanko/bert-tweeteval-distilroberta | 0.788881 | 0.750644 | 0.799548 | 0.728545 | | 0.0364 |\\n| GPT-4o-mini (Minimal Prompt) | 0.800141 | 0.601466 | 0.653766 | 0.579754 | 5060.112734 | |\\n| GPT-4o-mini (Structured Prompt) | **0.821956** | **0.781499** | 0.791218 | **0.773544** | 3823.308211 | |\\n| Qwen3-4B-Instruct-2507 (Minimal Prompt)    | 0.751583 | 0.584864 | 0.594974 | 0.581751 | 2571.471757 | | \\n| Qwen3-4B-Instruct-2507 (Structured Prompt) | 0.812104 | 0.758003 | **0.793805** | 0.741873 | 4931.231370 |\\n\\n: Final comparison chart across all model evaluations on TweetEval Emotion Classification. While we see that LLMs dominate on performance benchmarks, BERT-architecture models can reach nearly the same performance. \\n\\n## Baseline Analysis\\n\\nOn our baseline analysis, we found that the original DistilBert and DistilRoBERTa models severely underperformed on the TweetEval dataset. From Figure \\\\ref{fig:distilbert-base} and Figure \\\\ref{fig:distilroberta-base}, we see an extreme bias towards particular classifications and distributions that do not match our dataset and domain.\\n\\n## Training Strategy {#sec:training-strategy}\\n\\nOn both models, we initialize for 20 training epochs, a batch size of 16, AdamW optimization using a learning rate of 2e-5 and weight decay of 0.01. We employ EarlyStoppingCallback, early stopping based on the Macro F1 score on the validation set, and then select for the model with the best Macro F1 score after 3 failed improvements (patience of 3). We choose early stopping as our models experimentally overfit very easily, and we select Macro F1 as our stopping metric as it weighs each class equally, which is particularly important due to our imbalanced dataset.\\n\\n### Corruption Stress Testing {#sec:stress-tests}\\n\\nTo simulate data-corruption stress tests, we randomly introduce typos, hashtag splitting, and emoji removal.\\n\\n- **Typos**: We randomly swap, delete, or insert characters into words with chance \$p=0.1\$. This tests the model robustness against misspelled but recognizable words.\\n- **Split Hashtags**: We identify hashtags and split CamelCase words or remove the hashtag. This tests if the model relies on the hashtag or underlying semantic content better.\\n- **Remove Emoji**: Emojis strongly indicate emotion, and removing them tests if the model is robust enough to understand the other semantic cues.\\n\\nWe'll also conduct domain shift simulation. We create a shift by filtering tweets without mentions, links, or hashtags and compare performance.\\n\\n- **Mentions**: We compare performance once we strip all @user mentions from the evaluation.\\n- **Links**: We compare performance once we strip all http links.\\n- **Hashtags**: We compare performance once we strip all hashtags.\\n\\nTable: Corruption Ablations {#tbl:corruption-ablation} [!t*]\\n| Dataset Shift / Corruption | Accuracy (DistilBERT) | ECE (DistilBERT) | Macro F1 (DistilBERT) | Macro Precision (DistilBERT) | Macro Recall (DistilBERT) | Accuracy (DistilRoBERTa) | ECE (DistilRoBERTa) | Macro F1 (DistilRoBERTa) | Macro Precision (DistilRoBERTa) | Macro Recall (DistilRoBERTa) |\\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\\n| All corruptions | 0.777621 | 0.186762 | 0.731208 | 0.748215 | 0.719606 | 0.769880 | 0.027936 | 0.729321 | 0.785784 | 0.704836 |\\n| Emoji Removal | 0.796622 | 0.169403 | 0.759471 | 0.765310 | 0.754525 | 0.788177 | 0.044574 | 0.754264 | 0.799723 | 0.730673 |\\n| Hashtag Splitting | 0.797326 | 0.169666 | 0.758076 | 0.767174 | 0.751265 | 0.790289 | 0.049607 | 0.750437 | 0.804039 | 0.727826 |\\n| Typos | 0.774806 | 0.192172 | 0.735679 | 0.750336 | 0.726397 | 0.762139 | 0.032455 | 0.719843 | 0.767177 | 0.700259 |\\n| Baseline | 0.798030 | 0.169843 | 0.761196 | 0.767879 | 0.756296 | 0.788881 | 0.042115 | 0.750644 | 0.799548 | 0.728545 |\\n| All Domain Shifts | 0.798030 | 0.169843 | 0.761196 | 0.767879 | 0.756296 | 0.788881 | 0.042115 | 0.750644 | 0.799548 | 0.728545 |\\n| No Hashtags | 0.779412 | 0.183594 | 0.729214 | 0.740608 | 0.721849 | 0.783422 | 0.055099 | 0.730822 | 0.795115 | 0.706223 |\\n| No HTTP Links | 0.798030 | 0.169843 | 0.761196 | 0.767879 | 0.756296 | 0.788881 | 0.042115 | 0.750644 | 0.799548 | 0.728545 |\\n| No @ Mentions | 0.786865 | 0.178595 | 0.764952 | 0.763810 | 0.766616 | 0.788104 | 0.041246 | 0.763955 | 0.796607 | 0.749939 |\\n\\n: All corruption ablations and domain shifting ablations. While typos and corruption_all impact base model's accuracy (0.77), the distilroberta model maintains higher calibration.\\n\\n## Error Analysis {#sec:error-analysis}\\n\\n8 Missclassified samples from both models can be seen in Appendix \\\\ref{sec:missclassfied-tuned-models}. We can see how misspellings, such as \\"Deppression\\", cause unrecognizable token fragments '#', 'de', '##pp', '##ress', '##ion'. These can't be clearly mapped to any particular emotional state, and may be unrecognizable from the pre-trained vocabulary. \\n\\nFor misspellings, we would need to implement character-level data augmentation to simulate typos. We would inject random character insertions, deletions, and keyboard-distance typos, especially targetting emotional keywords. By forcing the model to see misspelled variants, we train the attention heads to recognize the pattern of the fragments. This may improve the score.\\n\\nOther missclassified sentences have words that seem semantically biased for one class, where subtle, but important tokens change the meaning significantly. For example, both tokenizers correctly break down \\"revolting\\", but neither model can weigh \\"i am\\" enough to overcome the \\"angry\\" connotations and classifications. Thus \\"i am revolting\\" is missclassified as \\"angry\\".\\n\\nIn order to counteract this, we need to increase our training samples or introduce more robust data augmentation to increase the semantic representation and understanding for our models. The best technique in this case would be Counterfactual data augmentation (CDA), where we generate more samples consisting of the word \\"revolting\\" in all scenarios, and thus we can diversify the model's interpretation of \\"revolting\\" across a greater number of samples and classes.\\n\\n## Open Source and Closed Models {#sec:prompt}\\n\\nWe evaluated two LLM models, Qwen3-4B-Instruct-2507 and GPT 4o-mini, on prompts from Appendix \\\\ref{sec:minimal-prompt} and Appendix \\\\ref{sec:structured-prompt}. They achieved SOTA results without manual tuning, and responses aligned with the distribution of the training data. \\n\\nA structured result demonstrated greater performance in all metrics over minimal prompts, except on throughput for Qwen. Longer prompts tap further into the parametric memory of models, they can elicit the pre-trained memory to produce more aligned responses. Our longer prompt thus increased the statistical chances of the model producing accurate emotion-classification assessment. Without such context priming, the model is not parametrically activated in the same specialized manner, and thus was more unlikely to produce an aligned response.\\n\\nThe final results for each tested model has been collected and summarized in Table \\\\ref{tbl:results}.\\n","/content/posts/edge-vision-smart-elevators-privacy-preserving-headcount-analysis.md":"---\\ntitle: \\"Edge-Vision for Smart Elevators: Privacy-Preserving Headcount Analysis\\"\\ndescription: \\"We use the Nuvoton M55M1 and its Ethos-U55 NPU, the system to run optimized ML models directly on the device. We convert a top-down camera feed into a digital count without the latency or cost of cloud processing.\\"\\npubDate: 2026-03-18 7:00 PM\\nauthors: [\\"bence-danko\\"]\\ntags: [\\"Embedded AI Hardware\\"]\\ntab: reports\\npdf: true\\nindexTerms: [\\"Edge AI\\", \\"YOLO-v8-nano\\", \\"Data collection\\"]\\n---\\n\\n\\n::tldraw{src=\\"./diagram.tldr\\"}\\n\\n::tldraw{src=\\"./diagram1.tldr\\"}\\n\\n<!-- tldraw-sync: 1775283026256 -->","/content/posts/enterprise-retrieval-augmented-generation-with-wixqa.md":"---\\ntitle: \\"Enterprise Retrieval-Augmented Generation (RAG) with WixQA\\"\\ndescription: \\"We apply advanced techniques for building and evaluating Retrieval-Augmented Generation systems in enterprise environments.\\"\\npubDate: 2026-03-13 7:00 PM\\nauthors: [\\"bence-danko\\"]\\ntags: [\\"Retrieval-Augmented Generation\\"]\\ntab: reports\\npdf: true\\n---\\n\\n## Abstract\\n\\nWe apply advanced techniques for building and evaluating Retrieval-Augmented Generation systems in enterprise environments. We construct a production-style RAG pipeline using the WixQA benchmark, which contains a real enterprise knowledge base and customer-support queries. The goal is to analyze how retrieval quality, chunking strategy, reranking, and query\\nrewriting influence the factuality and completeness of generated answers. All code available on [github](https://github.com/bencejdanko/wixqa-rag), and all data available on [Huggingface](https://huggingface.co/datasets/bdanko).\\n\\n## Enterprise Retrieval-Augmented Generation (RAG) with WixQA\\n\\n### Baseline RAG Implementation\\n\\nTable: Baseline RAG System Configuration [!h]\\n|  | Configuration |\\n| --- | --- |\\n| Embedding model | all-MiniLM-L6-v2 |\\n| Vector database | PgVector | \\n| Retriever type | HNSW |\\n| Generator model | gpt-oss-120b |\\n| Prompting Strategy | Zero-shot |\\n\\n: Baseline system configuration for our baseline RAG implementation.\\n\\nTable: WixQA-Synthetic Baseline results [!h]\\n| Chunk Size | Overlap | k | Context Recall | F1 | ROUGE-1 | Observation |\\n| --- | --- | --- | --- | --- | --- | --- |\\n| 300 | 30 | 1 | 0.4064 | 0.34138 | 0.42498 | |\\n| 300 | 30 | 3 | 0.5613 | 0.34728 | 0.43660 | |\\n| 300 | 30 | 5 | 0.6521 | 0.34405 | 0.43763 | |\\n| 300 | 30 | 10 | 0.7444 | 0.33869 | 0.43627 | |\\n| 300 | 60 | 1 | 0.4083 | 0.34304 | 0.42647 | |\\n| 300 | 60 | 3 | 0.5687 | 0.35029 | 0.44016 | |\\n| 300 | 60 | 5 | 0.6554 | 0.34648 | 0.44046 | |\\n| 300 | 60 | 10 | 0.7553 | 0.34026 | 0.43758 | |\\n| 500 | 30 | 1 | 0.4773 | 0.35659 | 0.44119 | Less overlap does not appear to significantly impact performance. |\\n| 500 | 30 | 3 | 0.6512 | 0.35566 | 0.44981 | Consistent performance gains with 60 overlap strategy |\\n| 500 | 30 | 5 | 0.7324 | 0.35313 | 0.45057 | |\\n| 500 | 30 | 10 | 0.8132 | 0.34613 | 0.44557 | |\\n| 500 | 60 | 1 | 0.4790 | 0.35658 | 0.44194 | |\\n| 500 | 60 | 3 | 0.6560 | 0.3574 | 0.4512 | |\\n| 500 | 60 | 5 | 0.7348 | 0.35291 | 0.45046 | |\\n| 500 | 60 | 10 | **0.8158** | 0.34672 | 0.44699 | Higher k consistently raises percieved judge recall score. |\\n\\n: Full results across all attempted chunking and overlap strategies. At higher k={5,10}, no more than ~0.5% of API calls were dropped due to API limits.\\n\\n- **Context Recall**: Measures whether the retrieved context contains the necessary\\ninformation to answer the question. We use LLM as a judge with temperature 0. We provide the \\njudge the query, the ground-truth answer, and the retrieved context to the\\nLLM judge to determine whether the retrieved context contains sufficient information to\\nanswer the query correctly by returning binary answer: Yes or NO.\\n- **F1 Score**: Measures token overlap between the generated answer and the ground-truth\\nanswer.\\n- **ROUGE-1**: Measures unigram overlaps and content coverage.\\n","/content/posts/hardware-accelerated-image-restoration-benchmarking-deep-learning-architectures-mla100-npu.md":"---\\ntitle: \\"Hardware-Accelerated Image Restoration: Benchmarking Deep Learning Architectures on the MLA100 NPU\\"\\ndescription: \\"We use Mobilint's MLA100 to restore Gaussian Blur, Gaussian Noise, and compression artifacts in images.\\"\\npubDate: 2026-03-16 10:00 PM\\nauthor: Bence Danko\\ntags: [\\"Deep Learning\\"]\\ntab: reports\\npdf: true\\n---\\n\\nI've prepared a dataset at [bdanko/image-restoration](https://huggingface.co/datasets/bdanko/image-restoration).\\n_\\nOur pipeline looks like this:\\n\\nOur GAN model\\n\\n![alt text](image.png \\"An example generation.\\")\\n\\n## Summary\\n\\nGAN Network\\n\\n| Model | Val PSNR | SSIM | Notes |\\n| --- | --- | --- | --- |\\n| GAN-v1 | 25.23 | 0.7294 | U-Net Generator and a PatchGAN Discriminator | \\n| GAN-v2 | 24.86 | 0.7082 | Cosine Annealing, MultiScale discrimination, Sobel-based EdgeLoss |\\n| GAN-v3 | 25.35 | 0.7375 | Cosine Annealing, 100 Epochs |\\n| GAN-v4 | 25.61 | 0.7533 | Spectral Normalization, TTUR |\\n| GAN-v5 | 21.00 | 0.70 | ResNet generator, Label Smoothing, Horizontal flips, noise annealing |\\n| GAN-v6 |  | 0.7550 | used v4 as base, added warmup |\\n\\n\\nImage Restoration\\n\\n| Model | Precision | Product Name | Train PSNR | Val PSNR | Notes | \\n| --- | --- | --- | --- | --- | --- |\\n| Baseline (no change) | | | 23.77 dB | 20.93db |\\n| Baseline-pruned | | | 20.54 dB | 20.93db |\\n| Gated-ResNet (Baseline) | FP32 | NVIDIA T4 | 22.94dB | 20.45dB |\\n| ResUnet (Baseline) | FP32 | NVIDIA L4 | 24.60dB | 21.04dB |\\n| ResNet (Baseline) | FP32 | NVIDIA L4 | 24.38dB | 21.16dB | [Report](/appendices/restore-3)  |\\n| UNet (Baseline-pruned) | FP32 | NVIDIA L4 | 21.61dB | 21.46dB | [Report](/appendices/restore-4)  |\\n| UNet-2 (synthesized data) | FP32 | A10 | 25.27dB | 21.47dB | [Report](/appendices/restore-5) |\\n\\n\\n\\n## Processing Performance\\n\\n--\\n\\n## Reports and Code\\n\\n| Model | Notebook | Report |\\n| --- | --- | --- |\\n| Gated-ResNet | [Notebook](https://github.com/bencejdanko/image-restoration-mla100/blob/main/2026-03-16/image_restoration.ipynb) | |\\n| ResUnet | [Notebook](https://github.com/bencejdanko/image-restoration-mla100/blob/main/2026-03-20/image_restoration.ipynb) |  |\\n| ResNet | [Notebook](https://github.com/bencejdanko/image-restoration-mla100/blob/main/2026-03-21/image_restoration.ipynb) | [Report](/appendices/restore-3) |\\n| UNet | [Notebook](https://github.com/bencejdanko/image-restoration-mla100/blob/main/2026-03-26/image_restoration.ipynb) | |\\n\\n\\n## Training Configurations\\n\\n| Model | Epochs | Optim | LR | Batch | Dimensions | Loss | Scheduler |\\n| --- | --- | --- | --- | --- | --- | --- | --- |\\n| Gated-ResNet | 3 | Adam | 0.0001 | 16 | 256x256 | MSE/SSIM | None |\\n| ResUnet | 6 | Adam | 5e-5 | 16 | 256x256 | L1/SSIM | CosineAnnealing (T_max=50, min=1e-6) |\\n| ResNet | 114 | Adam | 5e-5 | 16 | 128x128 | L1/SSIM | CosineAnnealing (T_max=2000, min=1e-6) |\\n| UNet | 47 | Adam | 1e-5 | 16 | 256x256 | Charbonnier | CosineAnnealing (T_max=100, min=1e-6) |\\n| UNet | 47 | Adam | 1e-5 | 16 | 256x256 | Charbonnier | CosineAnnealing (T_max=100, min=1e-6) |\\n| UNet-2 | 59 | Adam | 1e-5 | 16 | 256x256 | Charbonnier | CosineAnnealing (T_max=100, min=1e-6) |\\n\\n\\n\\n","/content/posts/int8-quantized-resnet10-mla100-comparative-study-image-classification-accuracy-throughput.md":"---\\ntitle: \\"INT8 Quantized ResNet10 on the MLA100: Comparative Study of Image Classification Accuracy and Throughput\\"\\ndescription: \\"We train and compile a ResNet10 classification model on an ImageNet subset. We then quantize and run inference on the Mobilint MLA100, an energy-efficient NPU.\\"\\npubDate: 2026-03-01\\nauthors: ['bence-danko']\\ntags: [\\"Computer Vision\\"]\\ntab: reports\\npdf: true\\n---\\n\\nPrediction of [20 classes](/imagenet-subset-classes) from ImageNet, using 6,000 images for training, and 1,000 for evaluation. Each class equally has 300 images for training, and 50 to validate. We must omit annotation data, working only off of this limited subset, and achieve at least 60% on validation accuracy.\\n\\n## Slide Deck\\n\\n## Dataset and Models.\\n\\nThe dataset used can be located at https://huggingface.co/datasets/bdanko/imagenetsubset20. All models are published at https://huggingface.co/bdanko/imagenetsub20.\\n\\n## Supported Operations\\n\\nThe final model can only support operations from the [MLA-100 \`qb\` compiler](/bencejdanko/mla-supported-operations).\\n\\n## Summary\\n\\n| Model | Precision | Product Name | Train | Val |\\n| --- | --- | --- | --- | --- |\\n| ResNet10-base | FP32 | NVIDIA A100 | 84.00% |  69.50% |\\n| ResNet10-2 | FP32 | NVIDIA A100 | 81.00% |  72.00% |\\n| ResNet10-3 | FP32 | NVIDIA A100 | 83.27% | 71.00% |\\n| ResNet10-4 | FP32 | NVIDIA L4 | 92.11% | 82.9% |\\n| ResNet10-5 | FP32 | NVIDIA L4 | 84.27% | **86.30%** | \\n| ResNet10-2 | INT8 (PTQ) | Mobilint MLA100 | x | x |\\n| ResNet10-5-calibratedv3 | INT8 (PTQ) | Mobilint MLA100 | x | **85.30%** |\\n\\n## Processing Performance\\n\\n| Model | Product Name | Performance (ms/image) | Images Per Second (img/sec) | Power (W)\\n| --- | --- | --- | --- | --- |\\n| ResNet10-5 | Intel(R) AI Boost (Ultra 5 255) | 2.86 | 349.8 | 65 |\\n| ResNet10-5 | MLA100 | 1.07 | 938.1 | 22 |\\n\\n### ResNet10\\n\\n| Model | Notebook | Huggingface | Report |\\n| --- | --- | --- | --- |\\n| ResNet10-base | [Notebook](https://github.com/bencejdanko/imagenet-classification-mobilint-mla-100/blob/main/2026-03-01/resnet10.ipynb) | bdanko/imagenetsub20/imagenetsub20resnet10.pth | [Report](/appendices/resnet10) |\\n| ResNet10-2 | [Notebook](https://github.com/bencejdanko/imagenet-classification-mobilint-mla-100/blob/main/2026-03-01/resnet10-2.ipynb) | bdanko/imagenetsub20/imagenetsub20resnet10-2.pth | [Report](/appendices/resnet10-2 ) |\\n| ResNet10-3 | [Notebook](https://github.com/bencejdanko/imagenet-classification-mobilint-mla-100/blob/main/2026-03-02/resnet10-3.ipynb) | N/A | [Report](/appendices/resnet10-3) |\\n| ResNet10-4 | [Notebook](https://github.com/bencejdanko/imagenet-classification-mobilint-mla-100/blob/main/2026-03-02/resnet10-4.ipynb) | bdanko/imagenetsub20/imagenetsub20resnet10-4.pth | [Report](/appendices/resnet10-4) |\\n| ResNet10-5 | [Notebook](https://github.com/bencejdanko/imagenet-classification-mobilint-mla-100/blob/main/2026-03-02/resnet10-5.ipynb) | bdanko/imagenetsub20/imagenetsub20resnet10-5.pth | [Report](/appendices/resnet10-5) |\\n\\n\\n### Training Configs\\n\\n| Model | Checkpoint | Epochs | Optim | LR | Batch |\\n| --- | --- | --- | --- | --- | --- |\\n| ResNet10-base | None | 52 | Adam | 0.001 | 1024 |\\n| ResNet10-2 | ResNet10-base | 14 | Adam | 0.001 | 1024 |\\n| ResNet10-3 | ResNet10-base | 14 | Adam | 0.001 | 1024 |\\n| ResNet10-4 | None | 93 | Adam/Cosine Annealing | 0.001 | 64 |\\n| ResNet10-5 | None | 163 | Adam/Cosine Annealing/EMA | 0.001 | 64 |\\n\\n\\n### Quantization\\n\\nModels were quantized using the 100 samples in [\`calib_npy\`](https://huggingface.co/datasets/bdanko/imagenetsubset20) as calibration.\\n","/content/posts/multi-modal-spatial-temporal-asl-translation-with-transformers.md":"---\\ntitle: \\"Multi-Modal Spatial-Temporal ASL Translation with Transformers\\"\\ndescription: >\\n    We develop an end-to-end translation framework that bridges the gap between American Sign Language (ASL) and natural language text. By fusing DinoV3 self-supervised visual embeddings with SAM-3D skeletal coordinates, the system captures both the semantic nuance of hand shapes and the spatial-temporal dynamics of body movement. We leverage a sliding-window CNN architecture and a fine-tuned M2M100 decoder, to evaluate performance on the How2Sign benchmark as measured by BLEU and METEOR scores.\\npubDate: 2026-03-18 3:00 PM\\nauthors: [\\"bence-danko\\"]\\ntags: [\\"Computer Vision\\"]\\ntab: reports\\npdf: true\\n---\\n\\n<iframe src=\\"https://docs.google.com/presentation/d/e/2PACX-1vSb7GLTSflE5bnTZxCW-HnbI2FpJA3acZbRDGW6w8bZVuj_ls68c1yDM47aEWx9rtkPrY16mPZvpHrQ/pubembed?start=false&loop=false&delayms=3000\\" frameborder=\\"0\\" width=\\"960\\" height=\\"569\\" allowfullscreen=\\"true\\" mozallowfullscreen=\\"true\\" webkitallowfullscreen=\\"true\\"></iframe>\\n","/content/appendices/backpropagation.md":"---\\ntitle: \\"full backpropagation calculation for neural networks\\"\\n---\\n\\n## Question 1\\n\\n### Forward Pass\\n\\n#### Hidden Layer\\n\\n\$\$Z_1^{[1]} = W_{10}^{[1]} + W_{11}^{[1]}a_1^{[0]} + W_{12}^{[1]}a_2^{[0]}\$\$\\n\\n\$\$Z_2^{[1]} = W_{20}^{[1]} + W_{21}^{[1]}a_1^{[0]} + W_{22}^{[1]}a_2^{[0]}\$\$\\n\\n\$\$a_1^{[1]} = \\\\sigma(Z_1^{[1]})\$\$\\n\\n\$\$a_2^{[1]} = \\\\sigma(Z_2^{[1]})\$\$\\n\\n#### Output layer\\n\\n\$\$Z^{[2]} = W_0^{[2]} + W_1^{[2]}a_1^{[1]} + W_2^{[2]}a_2^{[1]}\$\$\\n\\n\$\$a^{[2]} = \\\\sigma(Z^{[2]})\$\$\\n\\n---\\n\\n### Backpropagation\\n\\n#### Binary Cross Entropy Loss Derivative\\n\\nWe assume binary cross entropy loss:\\n\\n\$\$L(a^{[2]}, y) = -[y \\\\cdot \\\\log(a^{[2]}) + (1 - y) \\\\cdot \\\\log(1 - a^{[2]})]\$\$\\n\\n\$\$\\\\frac{d}{dx} \\\\log(x) = \\\\frac{1}{x}\$\$ \\n\\n\$\$\\\\frac{d}{dx} \\\\log(1-x) = -\\\\frac{1}{1-x}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} = -\\\\left[ y \\\\cdot \\\\frac{1}{a^{[2]}} + (1-y) \\\\cdot \\\\left( -\\\\frac{1}{1-a^{[2]}} \\\\right) \\\\right]\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} = -\\\\frac{y}{a^{[2]}} + \\\\frac{1-y}{1-a^{[2]}}\$\$\\n\\n#### Derivative of Sigmoid Activation\\n\\n\$\$\\\\frac{da}{dz} = \\\\frac{d}{dz}(1 + e^{-z})^{-1}\$\$\\n\\n\$\$\\\\frac{da}{dz} = -1(1 + e^{-z})^{-2} \\\\cdot (-e^{-z}) = \\\\frac{e^{-z}}{(1 + e^{-z})^2}\$\$\\n\\n\$\$\\\\frac{da}{dz} = \\\\left( \\\\frac{1}{1 + e^{-z}} \\\\right) \\\\cdot \\\\left( \\\\frac{1 + e^{-z} - 1}{1 + e^{-z}} \\\\right)\$\$\\n\\n\$\$\\\\frac{da}{dz} = \\\\sigma(z) \\\\cdot (1 - \\\\sigma(z))\$\$\\n\\n---\\n\\n### Output Layer Weights\\n\\nWe calculate the gradient for each weight by multiplying the loss derivative, the activation derivative, and the logit derivative.\\n\\n#### Weight \$W_0^{[2]}\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_0^{[2]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a^{[2]}}{\\\\partial Z^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z^{[2]}}{\\\\partial W_0^{[2]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_0^{[2]}} = \\\\left( -\\\\frac{y}{a^{[2]}} + \\\\frac{1-y}{1-a^{[2]}} \\\\right) \\\\cdot \\\\left( a^{[2]}(1 - a^{[2]}) \\\\right) \\\\cdot (1)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_0^{[2]}} = a^{[2]} - y\$\$\\n\\n#### Weight \$W_1^{[2]}\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_1^{[2]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a^{[2]}}{\\\\partial Z^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z^{[2]}}{\\\\partial W_1^{[2]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_1^{[2]}} = \\\\left( -\\\\frac{y}{a^{[2]}} + \\\\frac{1-y}{1-a^{[2]}} \\\\right) \\\\cdot \\\\left( a^{[2]}(1 - a^{[2]}) \\\\right) \\\\cdot (a_1^{[1]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_1^{[2]}} = (a^{[2]} - y)a_1^{[1]}\$\$\\n\\n#### Weight \$W_2^{[2]}\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_2^{[2]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a^{[2]}}{\\\\partial Z^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z^{[2]}}{\\\\partial W_2^{[2]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_2^{[2]}} = \\\\left( -\\\\frac{y}{a^{[2]}} + \\\\frac{1-y}{1-a^{[2]}} \\\\right) \\\\cdot \\\\left( a^{[2]}(1 - a^{[2]}) \\\\right) \\\\cdot (a_2^{[1]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_2^{[2]}} = (a^{[2]} - y)a_2^{[1]}\$\$\\n\\n---\\n\\n### Hidden Layer\\n\\nFor the hidden layer, we must first find how the loss changes with respect to the hidden activations \$a_i^{[1]}\$.\\n\\n#### Hidden Node 1 Weights\\n\\nFirst, we find the gradient of the loss with respect to the activation \$a_1^{[1]}\$:\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a^{[2]}}{\\\\partial Z^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z^{[2]}}{\\\\partial a_1^{[1]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} = \\\\left( -\\\\frac{y}{a^{[2]}} + \\\\frac{1-y}{1-a^{[2]}} \\\\right) \\\\cdot \\\\left( a^{[2]}(1 - a^{[2]}) \\\\right) \\\\cdot (W_1^{[2]})\$\$\\n\\nNow we apply the chain rule for the weights in Node 1:\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[1]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_1^{[1]}}{\\\\partial Z_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[1]}}{\\\\partial W_{11}^{[1]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[1]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} \\\\right) \\\\cdot \\\\left( a_1^{[1]}(1 - a_1^{[1]}) \\\\right) \\\\cdot (a_1^{[0]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[1]}} = (a^{[2]} - y)W_1^{[2]} \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot a_1^{[0]}\$\$\\n\\n#### Hidden Node 2\\n\\nFirst, we find the gradient of the loss with respect to the activation \$a_2^{[1]}\$:\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a^{[2]}}{\\\\partial Z^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z^{[2]}}{\\\\partial a_2^{[1]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} = \\\\left( -\\\\frac{y}{a^{[2]}} + \\\\frac{1-y}{1-a^{[2]}} \\\\right) \\\\cdot \\\\left( a^{[2]}(1 - a^{[2]}) \\\\right) \\\\cdot (W_2^{[2]})\$\$\\n\\nNow we apply the chain rule for the weights in Node 2:\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[1]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_2^{[1]}}{\\\\partial Z_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[1]}}{\\\\partial W_{21}^{[1]}} \\\\right)\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[1]}} = \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} \\\\right) \\\\cdot \\\\left( a_2^{[1]}(1 - a_2^{[1]}) \\\\right) \\\\cdot (a_1^{[0]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[1]}} = (a^{[2]} - y)W_2^{[2]} \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot a_1^{[0]}\$\$\\n\\n---\\n\\n## Final Weight Derivations\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_0^{[2]}} = a^{[2]} - y\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_1^{[2]}} = (a^{[2]} - y) a_1^{[1]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_2^{[2]}} = (a^{[2]} - y) a_2^{[1]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{10}^{[1]}} = (a^{[2]} - y) W_1^{[2]} \\\\cdot a_1^{[1]}(1 - a_1^{[1]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[1]}} = (a^{[2]} - y) W_1^{[2]} \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot a_1^{[0]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{12}^{[1]}} = (a^{[2]} - y) W_1^{[2]} \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot a_2^{[0]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{20}^{[1]}} = (a^{[2]} - y) W_2^{[2]} \\\\cdot a_2^{[1]}(1 - a_2^{[1]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[1]}} = (a^{[2]} - y) W_2^{[2]} \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot a_1^{[0]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{22}^{[1]}} = (a^{[2]} - y) W_2^{[2]} \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot a_2^{[0]}\$\$\\n\\n## Question 2\\n\\n### Forward Pass\\n\\n#### Hidden Layer\\n\\n\$\$Z_1^{[1]} = W_{10}^{[1]} + W_{11}^{[1]}a_1^{[0]} + W_{12}^{[1]}a_2^{[0]}\$\$\\n\\n\$\$Z_2^{[1]} = W_{20}^{[1]} + W_{21}^{[1]}a_1^{[0]} + W_{22}^{[1]}a_2^{[0]}\$\$\\n\\n\$\$a_1^{[1]} = \\\\sigma(Z_1^{[1]})\$\$\\n\\n\$\$a_2^{[1]} = \\\\sigma(Z_2^{[1]})\$\$\\n\\n#### Output layer\\n\\n\$\$Z_1^{[2]} = W_{10}^{[2]} + W_{11}^{[2]}a_1^{[1]} + W_{12}^{[2]}a_2^{[1]}\$\$\\n\\n\$\$Z_2^{[2]} = W_{20}^{[2]} + W_{21}^{[2]}a_1^{[1]} + W_{22}^{[2]}a_2^{[1]}\$\$\\n\\n\$\$a_1^{[2]} = \\\\frac{\\\\exp(Z_1^{[2]})}{\\\\exp(Z_1^{[2]}) + \\\\exp(Z_2^{[2]})}\$\$\\n\\n\$\$a_2^{[2]} = \\\\frac{\\\\exp(Z_2^{[2]})}{\\\\exp(Z_1^{[2]}) + \\\\exp(Z_2^{[2]})}\$\$\\n\\n---\\n\\n### Backpropagation\\n\\n#### Categorical Cross Entropy Loss Derivative\\n\\nWe assume categorical cross entropy loss for the multiple output classes:\\n\\n\$\$L(a^{[2]}, y) = -\\\\sum_{k=1}^{2} y_k \\\\cdot \\\\log(a_k^{[2]})\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_k^{[2]}} = -\\\\frac{y_k}{a_k^{[2]}}\$\$\\n\\n#### Derivative of Softmax Activation\\n\\n\$\$a_i^{[2]} = \\\\frac{\\\\exp(Z_1^{[2]})}{\\\\sum_{j=1}^{K} \\\\exp(Z_j^{[2]})}\$\$\\n\\nWhen \$i = j\$: \$\\\\frac{\\\\partial a_i^{[2]}}{\\\\partial Z_i^{[2]}} = a_i^{[2]}(1 - a_i^{[2]})\$\\n\\nWhen \$i \\\\neq j\$: \$\\\\frac{\\\\partial a_i^{[2]}}{\\\\partial Z_j^{[2]}} = -a_i^{[2]}a_j^{[2]}\$\\n\\nApplying the chain rule to find the gradient of the loss with respect to the logit \$Z_i^{[2]}\$:\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}} = \\\\sum_{k=1}^{2} \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_k^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_k^{[2]}}{\\\\partial Z_i^{[2]}} \\\\right)\$\$\\n\\nFor a specific node \$i\$ (and letting the other node be \$j\$):\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}} &= \\\\left( -\\\\frac{y_i}{a_i^{[2]}} \\\\right) \\\\cdot a_i^{[2]}(1 - a_i^{[2]}) \\\\\\\\\\n&\\\\quad + \\\\left( -\\\\frac{y_j}{a_j^{[2]}} \\\\right) \\\\cdot (-a_j^{[2]}a_i^{[2]})\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}} = -y_i(1 - a_i^{[2]}) + y_j a_i^{[2]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}} = -y_i + y_i a_i^{[2]} + y_j a_i^{[2]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}} = a_i^{[2]}(y_i + y_j) - y_i\$\$\\n\\nWe let \$y_i + y_j = 1\$:\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}} = a_i^{[2]} - y_i\$\$\\n\\n---\\n\\n### Output Layer Weights\\n\\nWe calculate the gradient for each weight by multiplying the loss derivative with respect to the logit (\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_i^{[2]}}\$) and the logit derivative with respect to the weight.\\n\\n#### Weights for Output Node 1\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{10}^{[2]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_1^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[2]}}{\\\\partial W_{10}^{[2]}} \\\\right) \\\\\\\\\\n&= (a_1^{[2]} - y_1) \\\\cdot (1) = a_1^{[2]} - y_1\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[2]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_1^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[2]}}{\\\\partial W_{11}^{[2]}} \\\\right) \\\\\\\\\\n&= (a_1^{[2]} - y_1) \\\\cdot (a_1^{[1]})\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{12}^{[2]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_1^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[2]}}{\\\\partial W_{12}^{[2]}} \\\\right) \\\\\\\\\\n&= (a_1^{[2]} - y_1) \\\\cdot (a_2^{[1]})\\n\\\\end{aligned}\\n\$\$\\n\\n#### Weights for Output Node 2\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{20}^{[2]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_2^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[2]}}{\\\\partial W_{20}^{[2]}} \\\\right) \\\\\\\\\\n&= (a_2^{[2]} - y_2) \\\\cdot (1) = a_2^{[2]} - y_2\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[2]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_2^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[2]}}{\\\\partial W_{21}^{[2]}} \\\\right) \\\\\\\\\\n&= (a_2^{[2]} - y_2) \\\\cdot (a_1^{[1]})\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{22}^{[2]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_2^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[2]}}{\\\\partial W_{22}^{[2]}} \\\\right) \\\\\\\\\\n&= (a_2^{[2]} - y_2) \\\\cdot (a_2^{[1]})\\n\\\\end{aligned}\\n\$\$\\n\\n---\\n\\n### Hidden Layer\\n\\nFor the hidden layer, we must first find how the loss changes with respect to the hidden activations \$a_i^{[1]}\$. Because each hidden node connects to multiple output nodes, we sum the gradients propagating backwards from all paths.\\n\\n#### Hidden Node 1 Weights\\n\\nFirst, we find the gradient of the loss with respect to the activation \$a_1^{[1]}\$:\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_1^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[2]}}{\\\\partial a_1^{[1]}} \\\\right) \\\\\\\\\\n&\\\\quad + \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_2^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[2]}}{\\\\partial a_1^{[1]}} \\\\right) \\\\\\\\\\n&= (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]}\\n\\\\end{aligned}\\n\$\$\\n\\nNow we apply the chain rule for the weights in Hidden Node 1:\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{10}^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_1^{[1]}}{\\\\partial Z_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[1]}}{\\\\partial W_{10}^{[1]}} \\\\right) \\\\\\\\\\n&= \\\\left[ (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot (1)\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_1^{[1]}}{\\\\partial Z_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[1]}}{\\\\partial W_{11}^{[1]}} \\\\right) \\\\\\\\\\n&= \\\\left[ (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot (a_1^{[0]})\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{12}^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_1^{[1]}}{\\\\partial Z_1^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[1]}}{\\\\partial W_{12}^{[1]}} \\\\right) \\\\\\\\\\n&= \\\\left[ (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot (a_2^{[0]})\\n\\\\end{aligned}\\n\$\$\\n\\n#### Hidden Node 2\\n\\nFirst, we find the gradient of the loss with respect to the activation \$a_2^{[1]}\$:\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_1^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_1^{[2]}}{\\\\partial a_2^{[1]}} \\\\right) \\\\\\\\\\n&\\\\quad + \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial Z_2^{[2]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[2]}}{\\\\partial a_2^{[1]}} \\\\right) \\\\\\\\\\n&= (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]}\\n\\\\end{aligned}\\n\$\$\\n\\nNow we apply the chain rule for the weights in Hidden Node 2:\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{20}^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_2^{[1]}}{\\\\partial Z_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[1]}}{\\\\partial W_{20}^{[1]}} \\\\right) \\\\\\\\\\n&= \\\\left[ (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot (1)\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_2^{[1]}}{\\\\partial Z_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[1]}}{\\\\partial W_{21}^{[1]}} \\\\right) \\\\\\\\\\n&= \\\\left[ (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot (a_1^{[0]})\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{22}^{[1]}} &= \\\\left( \\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial a_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial a_2^{[1]}}{\\\\partial Z_2^{[1]}} \\\\right) \\\\cdot \\\\left( \\\\frac{\\\\partial Z_2^{[1]}}{\\\\partial W_{22}^{[1]}} \\\\right) \\\\\\\\\\n&= \\\\left[ (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot (a_2^{[0]})\\n\\\\end{aligned}\\n\$\$\\n\\n---\\n\\n## Final Weight Derivations\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{10}^{[2]}} = a_1^{[2]} - y_1\$\$\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[2]}} = (a_1^{[2]} - y_1) a_1^{[1]}\$\$\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{12}^{[2]}} = (a_1^{[2]} - y_1) a_2^{[1]}\$\$\\n\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{20}^{[2]}} = a_2^{[2]} - y_2\$\$\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[2]}} = (a_2^{[2]} - y_2) a_1^{[1]}\$\$\\n\$\$\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{22}^{[2]}} = (a_2^{[2]} - y_2) a_2^{[1]}\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{10}^{[1]}} &= \\\\left[ (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_1^{[1]}(1 - a_1^{[1]})\\n\\\\end{aligned}\\n\$\$\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{11}^{[1]}} &= \\\\left[ (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot a_1^{[0]}\\n\\\\end{aligned}\\n\$\$\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{12}^{[1]}} &= \\\\left[ (a_1^{[2]} - y_1)W_{11}^{[2]} + (a_2^{[2]} - y_2)W_{21}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_1^{[1]}(1 - a_1^{[1]}) \\\\cdot a_2^{[0]}\\n\\\\end{aligned}\\n\$\$\\n\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{20}^{[1]}} &= \\\\left[ (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_2^{[1]}(1 - a_2^{[1]})\\n\\\\end{aligned}\\n\$\$\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{21}^{[1]}} &= \\\\left[ (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot a_1^{[0]}\\n\\\\end{aligned}\\n\$\$\\n\$\$\\n\\\\begin{aligned}\\n\\\\frac{\\\\partial L(a^{[2]}, y)}{\\\\partial W_{22}^{[1]}} &= \\\\left[ (a_1^{[2]} - y_1)W_{12}^{[2]} + (a_2^{[2]} - y_2)W_{22}^{[2]} \\\\right] \\\\\\\\\\n&\\\\quad \\\\cdot a_2^{[1]}(1 - a_2^{[1]}) \\\\cdot a_2^{[0]}\\n\\\\end{aligned}\\n\$\$\\n","/content/appendices/bert-tweeteval-loss.md":"---\\ntitle: Bert-TweetEval training loss diagrams. {#sec:bert-tweeteval-loss}\\n---\\n","/content/appendices/bert-tweeteval-screenshots.md":"---\\ntitle: Screenshots for Run Verification {#sec:bert-tweeteval-screenshots}\\n---\\n","/content/appendices/confusion-matrices.md":"---\\ntitle: Confusion matrices comparison across all evaluated models. {#sec:confusion-matrices}\\n---\\n","/content/appendices/decoding-strategies.md":"---\\ntitle: Decoding Strategies {#sec:decoding-strategies}\\n---\\n\\n\`\`\`\\nCount-based Trigram Model\\n\\n[Greedy] (Perplexity: 173.04)\\nanother year has been also carried on by public armed ships to the united states a great consolation that it is our duty and our harbors and jurisdiction infringements on the 30th day of september last have amounted to near 15m which have been recently made into the mediterranean fund instead thereof an equal footing with that of the united states a great consolation that it is our duty and our harbors and jurisdiction infringements on the 30th day of september last\\n\\n[Beam Search (w=3)] (Perplexity: 111.27)\\nanother year will be laid before you by the secretary of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the united states a great portion of the\\n\\n[Top-K (K=5)] (Perplexity: 2587.63)\\nanother year has come around and finds 'accounts 'an 'agriculture 'agriculture 'accounts 'an 'among 'among 'an 'an 'among 'an 'a 'agriculture 'agriculture 'a 'accounts 'accounts 'agriculture 'accounts 'a 'agriculture 'among 'agriculture 'accounts 'agriculture 'a 'among 'an 'an 'among 'agriculture 'an 'among 'an 'an 'an 'among 'an 'accounts 'accounts 'accounts 'accounts 'a 'among 'among 'a 'a 'agriculture 'accounts 'a 'accounts 'a 'a 'an 'a 'accounts 'a 'accounts 'a 'an 'among 'accounts 'a 'accounts 'agriculture 'an 'an 'among 'accounts 'among 'a 'a 'accounts 'agriculture\\n\\n[Nucleus (p=0.9)] (Perplexity: 3005.25)\\nanother year accountabilities injury merit availed suggest behavior anticipate june expenditures offer spread auctions difficulties charged manifesting expenditures safe strengthens unite 1802 sea' discernment purpose saving inhabitants promptness navyyards inland humanity prevented consequence administration members stream standing if condemnations retain identifying sacrifice carriages quarantines as accurate shorter representatives shows remain neutrals offender will' direction touch farms undefined navigation provisions position' prevent watched alleged serve facts alien guarding 600 removing sustained includes uncertain because yet numbers advantage advancing tripolitan 15m rapidity did forever\\nNeural Trigram Model\\n\\n[Greedy] (Perplexity: 8.47)\\nanother year of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the united states the country of the\\n\\n[Beam Search (w=3)] (Perplexity: 6.77)\\nanother year of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the united of the country of the\\n\\n[Top-K (K=5)] (Perplexity: 11.86)\\nanother year of the mississippi of the country and a to a of the country of the country of the country in the mediterranean of the public of their country and the country of our country to the public of that and of the country of our citizens the same of the united of the public of that the will of their country to the the of the public of the public of the last of our citizens and of our citizens\\n\\n[Nucleus (p=0.9)] (Perplexity: 135.73)\\nanother year when waters into to the unhappy debt on congress we have and for of a country for the of debt cases which are with no funded between very but any has from within its intercourse and person was remains the last of time to new nations the congress of the number of immediate congress the seat those with the yet whether the other of the united being than your according ought have not together means against citizens reduction also on\\n\`\`\`","/content/appendices/manus-lead.md":"---\\ntitle: \\"Yan Wu: Unix-style commands outperform a catalog of typed function calls.\\"\\n---\\n\\n> [!NOTE]\\n> [The original source to this was a post on reddit](https://old.reddit.com/r/LocalLLaMA/comments/1rrisqn/i_was_backend_lead_at_manus_after_building_agents/). A copy is here for preservation.\\n\\n*Author: [Yan Wu](https://github.com/yan5xu) (Manus). Originally posted March 9th.*\\n\\n---\\n\\nI was a backend lead at Manus before the Meta acquisition. I've spent the last 2 years building AI agents â first at Manus, then on my own open-source agent runtime (Pinix) and agent (agent-clip). Along the way I came to a conclusion that surprised me:\\n\\n> **A single \`run(command=\\"...\\")\` tool with Unix-style commands outperforms a catalog of typed function calls.**\\n\\n---\\n\\n## Why Unix\\n\\nUnix made a design decision 50 years ago: everything is a text stream. Programs don't exchange complex binary structures or share memory objects â they communicate through text pipes. Small tools each do one thing well, composed via \`|\` into powerful workflows. Programs describe themselves with \`--help\`, report success or failure with exit codes, and communicate errors through stderr.\\n\\nLLMs made an almost identical decision 50 years later: **everything is tokens.** They only understand text, only produce text. Their \\"thinking\\" is text, their \\"actions\\" are text, and the feedback they receive from the world must be text.\\n\\nThese two decisions, made half a century apart from completely different starting points, converge on the same interface model. The text-based system Unix designed for human terminal operators â \`cat\`, \`grep\`, \`pipe\`, \`exit codes\`, \`man pages\` â isn't just \\"usable\\" by LLMs. It's a natural fit. When it comes to tool use, an LLM is essentially a terminal operator â one that's faster than any human and has already seen vast amounts of shell commands and CLI patterns in its training data.\\n\\nThis is the core philosophy of the nix Agent: **don't invent a new tool interface. Take what Unix has proven over 50 years and hand it directly to the LLM.**\\n\\n---\\n\\n## Why a single run\\n\\n### The single-tool hypothesis\\n\\nMost agent frameworks give LLMs a catalog of independent tools:\\n\\n\`\`\`yaml\\ntools: [search_web, read_file, write_file, run_code, send_email, ...]\\n\`\`\`\\n\\nBefore each call, the LLM must make a **tool selection** â which one? What parameters? The more tools you add, the harder the selection, and accuracy drops. Cognitive load is spent on \\"which tool?\\" instead of \\"what do I need to accomplish?\\"\\n\\nMy approach: **one run(command=\\"...\\") tool, all capabilities exposed as CLI commands.**\\n\\n\`\`\`python\\nrun(command=\\"cat notes.md\\") \\nrun(command=\\"cat log.txt | grep ERROR | wc -l\\") \\nrun(command=\\"see screenshot.png\\") \\nrun(command=\\"memory search 'deployment issue'\\") \\nrun(command=\\"clip sandbox bash 'python3 analyze.py'\\")\\n\`\`\`\\n\\nThe LLM still chooses which command to use, but this is fundamentally different from choosing among 15 tools with different schemas. Command selection is string composition within a unified namespace â function selection is context-switching between unrelated APIs.\\n\\n### LLMs already speak CLI\\n\\nWhy are CLI commands a better fit for LLMs than structured function calls?\\n\\nBecause CLI is the densest tool-use pattern in LLM training data. Billions of lines on GitHub are full of:\\n\\n\`\`\`bash\\nREADME install instructions\\npip install -r requirements.txt && python main.py\\n\\nCI/CD build scripts\\nmake build && make test && make deploy\\n\\nStack Overflow solutions\\ncat /var/log/syslog | grep \\"Out of memory\\" | tail -20 \\n\`\`\`\\n\\nI don't need to teach the LLM how to use CLI â **it already knows.** This familiarity is probabilistic and model-dependent, but in practice it's remarkably reliable across mainstream models.\\n\\nCompare two approaches to the same task:\\n\\n\`\`\`markdown\\nTask: Read a log file, count the error lines\\n\\nFunction-calling approach (3 tool calls): 1. read_file(path=\\"/var/log/app.log\\") â returns entire file 2. search_text(text=<entire file>, pattern=\\"ERROR\\") â returns matching lines 3. count_lines(text=<matched lines>) â returns number\\n\\nCLI approach (1 tool call): run(command=\\"cat /var/log/app.log | grep ERROR | wc -l\\") â \\"42\\" \\n\`\`\`\\n\\nOne call replaces three. Not because of special optimization â but because Unix pipes natively support composition.\\n\\n### Making pipes and chains work\\n\\nA single run isn't enough on its own. If run can only execute one command at a time, the LLM still needs multiple calls for composed tasks. So I make a chain parser (parseChain) in the command routing layer, supporting four Unix operators:\\n\\n\`\`\`\\n| Pipe: stdout of previous command becomes stdin of next \\n&& And: execute next only if previous succeeded \\n|| Or: execute next only if previous failed \\n; Seq: execute next regardless of previous result\\n\`\`\`\\n\\nWith this mechanism, every tool call can be a **complete workflow:**\\n\\n\`\`\`bash\\nOne tool call: download â inspect\\ncurl -sL \$URL -o data.csv && cat data.csv | head 5\\n\\nOne tool call: read â filter â sort â top 10\\ncat access.log | grep \\"500\\" | sort | head 10\\n\\nOne tool call: try A, fall back to B\\ncat config.yaml || echo \\"config not found, using defaults\\" \\n\`\`\`\\n\\n\$N\$ commands Ă 4 operators â the composition space grows dramatically. And to the LLM, it's just a string it already knows how to write.\\n\\n> The command line is the LLM's native tool interface.\\n\\n---\\n\\n## Heuristic design: making CLI guide the agent\\n\\nSingle-tool + CLI solves \\"what to use.\\" But the agent still needs to know **\\"how to use it.\\"** It can't Google. It can't ask a colleague. I use three progressive design techniques to make the CLI itself serve as the agent's navigation system.\\n\\n### Technique 1: Progressive --help discovery\\n\\nA well-designed CLI tool doesn't require reading documentation â because \`--help\` tells you everything. I apply the same principle to the agent, structured as **progressive disclosure:** the agent doesn't need to load all documentation at once, but discovers details on-demand as it goes deeper.\\n\\n#### Level 0: Tool Description â command list injection\\n\\nThe \`run\` tool's description is dynamically generated at the start of each conversation, listing all registered commands with one-line summaries:\\n\\n\`\`\`markdown\\nAvailable commands: \\n    cat â Read a text file. For images use 'see'. For binary use 'cat -b'. \\n    see â View an image (auto-attaches to vision) \\n    ls â List files in current topic \\n    write â Write file. Usage: write <path> [content] or stdin \\n    grep â Filter lines matching a pattern (supports -i, -v, -c) \\n    memory â Search or manage memory \\n    clip â Operate external environments (sandboxes, services) \\n    ...\\n\`\`\`\\n\\nThe agent knows what's available from turn one, but doesn't need every parameter of every command â that would waste context.\\n\\n> **Note:** There's an open design question here: injecting the full command list vs. on-demand discovery. As commands grow, the list itself consumes context budget. I'm still exploring the right balance. Ideas welcome.\\n\\n#### Level 1: command (no args) â usage\\n\\nWhen the agent is interested in a command, it just calls it. No arguments? The command returns its own usage:\\n\\n\`\`\`bash\\nâ run(command=\\"memory\\") [error] memory: usage: memory search|recent|store|facts|forget\\n\\nâ run(command=\\"clip\\") clip list â list available clips clip <name> â show clip details and commands clip <name> <command> [args...] â invoke a command clip <name> pull <remote-path> [name] â pull file from clip to local clip <name> push <local-path> <remote> â push local file to clip \\n\`\`\`\\n\\nNow the agent knows \`memory\` has five subcommands and \`clip\` supports list/pull/push. One call, no noise.\\n\\n#### Level 2: command subcommand (missing args) â specific parameters\\n\\nThe agent decides to use memory search but isn't sure about the format? It drills down:\\n\\n\`\`\`bash\\nâ run(command=\\"memory search\\") [error] memory: usage: memory search <query> [-t topic_id] [-k keyword]\\n\\nâ run(command=\\"clip sandbox\\") Clip: sandbox Commands: clip sandbox bash <script> clip sandbox read <path> clip sandbox write <path> File transfer: clip sandbox pull <remote-path> [local-name] clip sandbox push <local-path> <remote-path> \\n\`\`\`\\n\\nProgressive disclosure: **overview (injected) â usage (explored) â parameters (drilled down).** The agent discovers on-demand, each level providing just enough information for the next step.\\n\\nThis is fundamentally different from stuffing 3,000 words of tool documentation into the system prompt. Most of that information is irrelevant most of the time â pure context waste. Progressive help lets the agent decide when it needs more.\\n\\nThis also imposes a requirement on command design: **every command and subcommand must have complete help output.** It's not just for humans â it's for the agent. A good help message means one-shot success. A missing one means a blind guess.\\n\\n### Technique 2: Error messages as navigation\\n\\nAgents will make mistakes. The key isn't preventing errors â it's **making every error point to the right direction.**\\n\\nTraditional CLI errors are designed for humans who can Google. Agents can't Google. So I require every error to contain both \\"what went wrong\\" and \\"what to do instead\\":\\n\\n\`\`\`\\nTraditional CLI: \$ cat photo.png cat: binary file (standard output) â Human Googles \\"how to view image in terminal\\"\\n\\nMy design: [error] cat: binary image file (182KB). Use: see photo.png â Agent calls see directly, one-step correction \\n\`\`\`\\n\\nMore examples:\\n\\n\`\`\`txt\\n[error] unknown command: foo Available: cat, ls, see, write, grep, memory, clip, ... â Agent immediately knows what commands exist\\n\\n[error] not an image file: data.csv (use cat to read text files) â Agent switches from see to cat\\n\\n[error] clip \\"sandbox\\" not found. Use 'clip list' to see available clips â Agent knows to list clips first \\n\`\`\`\\n\\nTechnique 1 (help) solves \\"what can I do?\\" Technique 2 (errors) solves \\"what should I do instead?\\" Together, the agent's recovery cost is minimal â usually 1-2 steps to the right path.\\n\\n#### Real case: The cost of silent stderr\\n\\nFor a while, my code silently dropped stderr when calling external sandboxes â whenever stdout was non-empty, stderr was discarded. The agent ran \`pip install pymupdf\`, got exit code 127. stderr contained \`bash: pip: command not found\`, but the agent couldn't see it. It only knew \\"it failed,\\" not \\"why\\" â and proceeded to blindly guess 10 different package managers:\\n\\n\`\`\`txt\\npip install â 127 (doesn't exist)\\npython3 -m pip â 1 (module not found) \\nuv pip install â 1 (wrong usage) \\npip3 install â 127 sudo apt install â 127 \\n... 5 more attempts ... \\nuv run --with pymupdf python3 script.py â 0 â (10th try)\\n\`\`\`\\n\\n10 calls, ~5 seconds of inference each. If stderr had been visible the first time, one call would have been enough.\\n\\n> **stderr is the information agents need most, precisely when commands fail. Never drop it.**\\n\\n### Technique 3: Consistent output format\\n\\nThe first two techniques handle discovery and correction. The third lets the agent **get better at using the system over time.**\\n\\nI append consistent metadata to every tool result:\\n\\n\`\`\`\\nfile1.txt \\nfile2.txt \\ndir1/ \\n[exit:0 | 12ms]\\n\`\`\`\\n\\nThe LLM extracts two signals:\\n\\n**Exit codes (Unix convention, LLMs already know these):**\\n\\n- \`exit:0\` â success\\n- \`exit:1\` â general error\\n- \`exit:127\` â command not found\\n\\n**Duration (cost awareness):**\\n\\n- \`12ms\` â cheap, call freely\\n- \`3.2s\` â moderate\\n- \`45s\` â expensive, use sparingly\\n\\nAfter seeing \`[exit:N | Xs]\` dozens of times in a conversation, the agent internalizes the pattern. It starts anticipating â seeing \`exit:1\` means check the error, seeing long duration means reduce calls.\\n\\n> **Consistent output format makes the agent smarter over time. Inconsistency makes every call feel like the first.**\\n\\nThe three techniques form a progression:\\n\\n\`\`\`\\n--help â \\"What can I do?\\" â Proactive discovery \\nError Msg â \\"What should I do?\\" â Reactive correction \\nOutput Fmt â \\"How did it go?\\" â Continuous learning\\n\`\`\`\\n\\n---\\n\\n## Two-layer architecture: engineering the heuristic design\\n\\nThe section above described how CLI guides agents at the semantic level. But to make it work in practice, there's an engineering problem: **the raw output of a command and what the LLM needs to see are often very different things.**\\n\\n### Two hard constraints of LLMs\\n\\n**Constraint A: The context window is finite and expensive.** Every token costs money, attention, and inference speed. Stuffing a 10MB file into context doesn't just waste budget â it pushes earlier conversation out of the window. The agent \\"forgets.\\"\\n\\n**Constraint B: LLMs can only process text.** Binary data produces high-entropy meaningless tokens through the tokenizer. It doesn't just waste context â it **disrupts attention on surrounding valid tokens,** degrading reasoning quality.\\n\\nThese two constraints mean: raw command output can't go directly to the LLM â it needs a **presentation layer** for processing. But that processing can't affect command execution logic â or pipes break. Hence, two layers.\\n\\n### Execution layer vs. presentation layer\\n\\n\`\`\`\\nâââââââââââââââââââââââââââââââââââââââââââââââ\\nâ  Layer 2: LLM Presentation Layer            â  â Designed for LLM constraints\\nâ  Binary guard | Truncation+overflow | Meta   â\\nâââââââââââââââââââââââââââââââââââââââââââââââ€\\nâ  Layer 1: Unix Execution Layer              â  â Pure Unix semantics\\nâ  Command routing | pipe | chain | exit code â\\nâââââââââââââââââââââââââââââââââââââââââââââââ\\n\`\`\`\\n\\nWhen \`cat bigfile.txt | grep error | head 10\` executes:\\n\\n\`\`\`\\nInside Layer 1: \\n    cat output â [500KB raw text] â \\n    grep input grep output â [matching lines] â head input \\n    head output â [first 10 lines]\\n\`\`\`\\n\\nIf you truncate \`cat\`'s output in Layer 1 â grep only searches the first 200 lines, producing incomplete results. If you add \`[exit:0]\` in Layer 1 â it flows into \`grep\` as data, becoming a search target.\\n\\nSo Layer 1 must remain **raw, lossless, metadata-free.** Processing only happens in Layer 2 â after the pipe chain completes and the final result is ready to return to the LLM.\\n\\n> **Layer 1 serves Unix semantics. Layer 2 serves LLM cognition. The separation isn't a design preference â it's a logical necessity.**\\n\\n### Layer 2's four mechanisms\\n\\n**Mechanism A: Binary Guard (addressing Constraint B)**\\n\\nBefore returning anything to the LLM, check if it's text:\\n\\n\`\`\` \\nNull byte detected â binary \\nUTF-8 validation failed â binary \\nControl character ratio > 10% â binary\\n\\nIf image: [error] binary image (182KB). Use: see photo.png \\nIf other: [error] binary file (1.2MB). Use: cat -b file.bin \\n\`\`\`\\n\\nThe LLM never receives data it can't process.\\n\\n**Mechanism B: Overflow Mode (addressing Constraint A)**\\n\\n\`\`\` \\nOutput > 200 lines or > 50KB? \\n    â Truncate to first 200 lines (rune-safe, won't split UTF-8) \\n    â Write full output to /tmp/cmd-output/cmd-{n}.txt \\n    â Return to LLM:\\n\\n    [first 200 lines]\\n\\n    --- output truncated (5000 lines, 245.3KB) ---\\n    Full output: /tmp/cmd-output/cmd-3.txt\\n    Explore: cat /tmp/cmd-output/cmd-3.txt | grep <pattern>\\n         cat /tmp/cmd-output/cmd-3.txt | tail 100\\n    [exit:0 | 1.2s]\\n\`\`\`\\n\\nKey insight: the LLM already knows how to use \`grep\`, \`head\`, \`tail\` to navigate files. Overflow mode transforms \\"large data exploration\\" into a skill the LLM already has.\\n\\n**Mechanism C: Metadata Footer**\\n\\n\`\`\`\\nactual output here \\n[exit:0 | 1.2s]\\n\`\`\`\\n\\nExit code + duration, appended as the last line of Layer 2. Gives the agent signals for success/failure and cost awareness, without polluting Layer 1's pipe data.\\n\\n**Mechanism D: stderr Attachment**\\n\\n\`\`\` \\nWhen command fails with stderr: \\n    output + \\"\\\\n[stderr] \\" + stderr\\n\\nEnsures the agent can see why something failed, preventing blind retries. \\n\`\`\`\\n\\n## Lessons learned: stories from production\\n\\n### Story 1: A PNG that caused 20 iterations of thrashing\\n\\nA user uploaded an architecture diagram. The agent read it with \`cat\`, receiving 182KB of raw PNG bytes. The LLM's tokenizer turned these bytes into thousands of meaningless tokens crammed into the context. The LLM couldn't make sense of it and started trying different read approaches â \`cat -f\`, \`cat --format\`, \`cat --type image\` â each time receiving the same garbage. After 20 iterations, the process was force-terminated.\\n\\n**Root cause:**: \`cat\` had no binary detection, Layer 2 had no guard. **Fix:** \`isBinary()\` guard + error guidance \`Use: see photo.png.\` **Lesson:** The tool result is the agent's eyes. Return garbage = agent goes blind.\\n\\n### Story 2: Silent stderr and 10 blind retries\\n\\nThe agent needed to read a PDF. It tried \`pip install pymupdf\`, got exit code 127. stderr contained \`bash: pip: command not found\`, but the code dropped it â because there was some stdout output, and the logic was \\"if stdout exists, ignore stderr.\\"\\n\\nThe agent only knew \\"it failed,\\" not \\"why.\\" What followed was a long trial-and-error:\\n\\n\`\`\`\\npip install â 127 (doesn't exist) \\npython3 -m pip â 1 (module not found) \\nuv pip install â 1 (wrong usage) \\npip3 install â 127 sudo apt install â 127 \\n... 5 more attempts ... \\nuv run --with pymupdf python3 script.py â 0 â\\n\`\`\`\\n\\n10 calls, ~5 seconds of inference each. If stderr had been visible the first time, one call would have sufficed.\\n\\n**Root cause:** \`InvokeClip\` silently dropped stderr when stdout was non-empty. **Fix:** Always attach stderr on failure. **Lesson:** stderr is the information agents need most, precisely when commands fail.\\n\\n### Story 3: The value of overflow mode\\n\\nThe agent analyzed a 5,000-line log file. Without truncation, the full text (~200KB) was stuffed into context. The LLM's attention was overwhelmed, response quality dropped sharply, and earlier conversation was pushed out of the context window.\\n\\nWith overflow mode:\\n\\n\`\`\` \\n[first 200 lines of log content]\\n\\n--- output truncated (5000 lines, 198.5KB) --- \\nFull output: /tmp/cmd-output/cmd-3.txt \\nExplore: cat /tmp/cmd-output/cmd-3.txt | grep <pattern> \\n    cat /tmp/cmd-output/cmd-3.txt | tail 100 [exit:0 | 45ms] \\n\`\`\`\\n\\nThe agent saw the first 200 lines, understood the file structure, then used grep to pinpoint the issue â 3 calls total, under 2KB of context.\\n\\n**Lesson:** Giving the agent a \\"map\\" is far more effective than giving it the entire territory.\\n\\n---\\n\\n## Boundaries and limitations\\n\\nCLI isn't a silver bullet. Typed APIs may be the better choice in these scenarios:\\n\\n- **Strongly-typed interactions:** Database queries, GraphQL APIs, and other cases requiring structured input/output. Schema validation is more reliable than string parsing.\\n- **High-security requirements:** CLI's string concatenation carries inherent injection risks. In untrusted-input scenarios, typed parameters are safer. agent-clip mitigates this through sandbox isolation.\\n- **Native multimodal:** Pure audio/video processing and other binary-stream scenarios where CLI's text pipe is a bottleneck.\\n\\nAdditionally, \\"no iteration limit\\" doesn't mean \\"no safety boundaries.\\" Safety is ensured by external mechanisms:\\n\\n- **Sandbox isolation:** Commands execute inside BoxLite containers, no escape possible\\n- **API budgets:** LLM calls have account-level spending caps\\n- **User cancellation:** Frontend provides cancel buttons, backend supports graceful shutdown\\n\\n---\\n\\n> Hand Unix philosophy to the execution layer, hand LLM's cognitive constraints to the presentation layer, and use help, error messages, and output format as three progressive heuristic navigation techniques.\\n\\nCLI is all agents need.\\n\\n---\\n\\nSource code (Go): github.com/epiral/agent-clip\\n\\nCore files: \`internal/tools.go\` (command routing), \`internal/chain.go\` (pipes), \`internal/loop.go\` (two-layer agentic loop), \`internal/fs.go\` (binary guard), \`internal/clip.go\` (stderr handling), \`internal/browser.go\` (vision auto-attach), \`internal/memory.go\` (semantic memory).\\n\\n## Comments\\n\\nMost commands never touch the OS. cat, grep, memory search, browser open â these look like shell commands but they're implemented as a Go command router. The LLM outputs a string, I parse it and dispatch to native functions. No os/exec, no shell injection surface. It's essentially typed functions wearing CLI syntax â same access control, but the LLM gets a familiar interface.\\n\\nWhen you do need real OS execution (e.g. running a Python script or installing packages), it runs inside a micro-VM â an isolated QCOW2 virtual machine with its own filesystem. The agent can do whatever it wants inside the sandbox. It can rm -rf / and nothing happens to the host. Sandbox isolation > command filtering.","/content/appendices/minimal-prompt.md":"---\\ntitle: Minimal Prompt for TweetEval Emotion Classification {#sec:minimal-prompt}\\n---\\n\\n\`\`\`\\nClassify the following tweet into one of these emotions: anger, joy, optimism, sadness.\\nTweet: {text}\\nEmotion:\\n\`\`\`","/content/appendices/missclassfied-base-models.md":"---\\ntitle: Misclassified Base Models TweetEval Samples {#sec:missclassfied-base-models}\\n---\\n\\n\`\`\`\\nText: @user Interesting choice of words... Are you confirming that governments fund #terrorism? Bit of an open door, but still...\\nTrue: anger | Fine-Tuned DistilBERT Pred: label_0 | Fine-Tuned DistilRoBERTa Pred: label_0\\nWordPiece (DistilBERT): ['@', 'user', 'interesting', 'choice', 'of', 'words', '.', '.', '.', 'are', 'you', 'confirming', 'that', 'governments', 'fund', '#', 'terrorism', '?', 'bit', 'of', 'an', 'open', 'door', ',', 'but', 'still', '.', '.', '.']\\nBPE (DistilRoBERTa): ['@', 'user', 'Ä Interesting', 'Ä choice', 'Ä of', 'Ä words', '...', 'Ä
