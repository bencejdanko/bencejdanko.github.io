n.\\nReasoning: Despite being in 3rd class, her survival is attributed to her demographic as a young, unencumbered female, which prioritized her for the limited lifeboat capacity available to steerage passengers. Her status as a solo traveler (Group Size 1) likely allowed her to navigate the ship's complex corridors and reach the upper decks more quickly than those delayed by the logistical and emotional burden of large family groups. Additionally, her embarkation at Queenstown suggests she was among the Irish contingent that successfully reached the aft boat deck where Collapsible C and other late boats were launched.\\nOutcome: 1\\n\\nCase 5: Name: Downton, Mr. William James, Passenger Class: 2nd, Sex: male, Age: 54.0 years old, Siblings/Spouses Aboard: 0, Parents/Children Aboard: 0, Group Size (on same ticket): 2, Fare: \$26.00, Ticket: 28403, Cabin: Cabin unknown, Embarked: Southampton.\\nReasoning: As a 54-year-old male in 2nd Class, Mr. Downton fell into the demographic with the lowest survival rate, as priority was strictly given to women and children, and 2nd-class men were notably expected to adhere to \\"chivalric\\" codes of conduct. Traveling without immediate family but with a companion on a mid-range fare, he lacked the social leverage of 1st Class and the youthful agility that occasionally aided younger men in the water, ultimately succumbing to the \\"women and children first\\" protocol which saw nearly 90% of 2nd-class adult males perish.\\nOutcome: 0\\n\\nAnalyze the survival chances of this passenger. Consider multiple historical scenarios.\\n\\nSubject:\\nName: O'Connor, Mr. Maurice, Passenger Class: 3rd, Sex: male, Age: Age unknown, Siblings/Spouses Aboard: 0, Parents/Children Aboard: 0, Group Size (on same ticket): 1, Fare: \$7.75, Ticket: 371060, Cabin: Cabin unknown, Embarked: Queenstown.\\n\\nProvide 2-3 detailed lines of reasoning regarding the trade-offs between their class, gender, and family status. Be mindful that 'standard' rules had many exceptions. Conclude with 'Final Prediction: ' followed by 1 or 0.\\n\`\`\`","/content/appendices/titanic-system.md":"---\\ntitle: Titanic System Prompt {#sec:titanic-system}\\n---\\n\\n\`\`\`\\nYou are a highly advanced historical forensic analyst and data scientist specializing in the Titanic disaster.\\nYour goal is to predict passenger survival with extreme precision.\\n\\nKey heuristics to remember (but treat as non-absolute):\\n1. \\"Women and children first\\": Generally true, but class played a massive role.\\n2. Class dynamics: 1st class had better access; 3rd class faced physical barriers (gates, distance).\\n3. Exceptional cases: Some 1st class men survived by boarding early boats or surviving the water; some 3rd class women/children perished due to being trapped or lost in the corridors.\\n4. Titles: \\"Master\\" indicates a young boy, \\"Rev.\\" indicates a Reverend, \\"Dr.\\" or \\"Col.\\" indicates social status.\\n5. Large families: Often stayed together, leading to delays that could be fatal for everyone in the group.\\n\\nYou MUST analyze the specific combination of features. If asked for reasoning, be nuanced.\\nOutput ONLY 1 (survived) or 0 (did not survive) when asked for the final prediction.\\n\`\`\`","/content/appendices/titanic-tot.md":"---\\ntitle: Titanic Tree-of-Thought {#sec:titanic-tot}\\n---\\n\\n\`\`\`\\nTarget Passenger Profile:\\nName: O'Connor, Mr. Maurice, Passenger Class: 3rd, Sex: male, Age: Age unknown, Siblings/Spouses Aboard: 0, Parents/Children Aboard: 0, Group Size (on same ticket): 1, Fare: \$7.75, Ticket: 371060, Cabin: Cabin unknown, Embarked: Queenstown.\\n\\nThree specialized experts are deliberating on this survival case:\\n\\n1. **Socio-Structural Expert**: Analyzes Class, Fare, and Cabin location. Focuses on physical barriers to the boat deck.\\n2. **Demographic & Protocol Expert**: Analyzes Age, Sex, and Titles. Focuses on the 'Birkenhead Drill' (women and children first) and how it varied by class.\\n3. **Dynamics & Group Expert**: Analyzes Name, Ticket, SibSp, and Parch. Focuses on family obligations, group mobility, and potential group survival/perish patterns.\\n\\nProvide the assessment from each expert. Explicitly look for reasons why this passenger might be an exception to the rules.\\nThen, synthesize these views into a final consensus.\\nFinal Prediction: [1 or 0]\\n\`\`\`","/content/appendices/titanic-zero-shot.md":"---\\ntitle: Titanic Zero-shot {#sec:titanic-zero-shot}\\n---\\n\\n\`\`\`\\nForensic Analysis Request: Predict if the following passenger survived the Titanic sinking.\\n--------------------------\\nName: O'Connor, Mr. Maurice, Passenger Class: 3rd, Sex: male, Age: Age unknown, Siblings/Spouses Aboard: 0, Parents/Children Aboard: 0, Group Size (on same ticket): 1, Fare: \$7.75, Ticket: 371060, Cabin: Cabin unknown, Embarked: Queenstown.\\n--------------------------\\nBased on historical data and demographics, what is the survival outcome?\\nOutput 1 for survived, 0 for did not survive. Output ONLY the digit.\\nPrediction:\\n\`\`\`","/content/appendices/toolmind.md":"---\\ntitle: Example ToolMind Entry\\n---\\n\\n\`\`\`txt\\n{\\n  \\"conversations\\": [\\n    {\\n      \\"role\\": \\"user\\",\\n      \\"content\\": \\"Could you help me ensure a flight status for route KY1230 on string \\\\\\"Monday\\\\\\" and search for a person named \\\\\\"John Doe\\\\\\" in the US? Additionally, could you retrieve information about an auditor named \\\\\\"KPMG Global\\\\\\" in the Business Software domain?\\"\\n    },\\n    {\\n      \\"tool_calls\\": [\\n        {\\n          \\"function\\": {\\n            \\"name\\": \\"ensure-flight\\",\\n            \\"arguments\\": {\\n              \\"route_id\\": \\"KY1230\\",\\n              \\"string\\": \\"Monday\\"\\n            }\\n          }\\n        },\\n        {\\n          \\"function\\": {\\n            \\"name\\": \\"Search Person by Name\\",\\n            \\"arguments\\": {\\n              \\"q\\": \\"John Doe\\",\\n              \\"countryCode\\": \\"us\\"\\n            }\\n          }\\n        },\\n        {\\n          \\"function\\": {\\n            \\"name\\": \\"Get Auditor Information\\",\\n            \\"arguments\\": {\\n              \\"roac\\": \\"KPMG Global\\"\\n            }\\n          }\\n        }\\n      ],\\n      \\"role\\": \\"assistant\\",\\n      \\"content\\": \\"<think>\\\\nOkay, let's break down what the user is asking for. They have three main requests here. First, they want to ensure the flight status for route KY1230 on the string \\\\\\"Monday\\\\\\". Second, they need to search for a person named \\\\\\"John Doe\\\\\\" in the US. Third, they want information about an auditor named \\\\\\"KPMG Global\\\\\\" in the Business Software domain.\\\\n\\\\nStarting with the flight status. Looking at the tools provided, there's an API called \\\\\\"ensure-flight\\\\\\" which requires route_id and string parameters. The user provided route KY1230 and string \\\\\\"Monday\\\\\\", so that's straightforward. The passenger_count has a default of 1, so even if they didn't mention it, we can use the default. So I'll call ensure-flight with route_id KY1230 and string Monday.\\\\n\\\\nNext, searching for \\\\\\"John Doe\\\\\\" in the US. The tool \\\\\\"Search Person by Name\\\\\\" needs a query (q) and optionally a countryCode. The user specified US, which is the default, but it's safe to include it. So parameters would be q: \\\\\\"John Doe\\\\\\", countryCode: \\\\\\"us\\\\\\".\\\\n\\\\nThird, retrieving auditor info for \\\\\\"KPMG Global\\\\\\". The tool \\\\\\"Get Auditor Information\\\\\\" requires roac, which is the auditor's name or ID. The user provided \\\\\\"KPMG Global\\\\\\", so roac should be that.\\\\n\\\\nI need to make sure all required parameters are present for each tool. For ensure-flight, route_id and string are required, which are given. For Search Person, q is required, which is provided. For Get Auditor, roac is required. All set.\\\\n\\\\nNo parameters are missing, so three separate tool calls are needed here. Let me structure each in the correct JSON format as specified.\\\\n</think>\\"\\n    }\\n  ],\\n  \\"tools\\": [\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"System Availability Check\\",\\n        \\"description\\": \\"This API checks the availability of systems to ensure everything is operational.\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"system_id\\": {\\n              \\"description\\": \\"The unique identifier of the system to check\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"timeout\\": {\\n              \\"description\\": \\"The time in seconds to wait for the system to respond\\",\\n              \\"type\\": \\"int\\"\\n            }\\n          },\\n          \\"required\\": [\\n            \\"system_id\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    },\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"Search Person by Name\\",\\n        \\"description\\": \\"Search for a person by name and returns a list of matching persons with additional information\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"q\\": {\\n              \\"description\\": \\"The name of the person to search for\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"countryCode\\": {\\n              \\"description\\": \\"Optional parameter to filter results by country code\\",\\n              \\"type\\": \\"string\\",\\n              \\"default\\": \\"us\\"\\n            }\\n          },\\n          \\"required\\": [\\n            \\"q\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    },\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"ensure-flight\\",\\n        \\"description\\": \\"This API ensures the flight schedule and availability for a given route and string.\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"route_id\\": {\\n              \\"description\\": \\"The unique identifier of the flight route.\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"string\\": {\\n              \\"description\\": \\"The string for which the flight schedule is required.\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"passenger_count\\": {\\n              \\"description\\": \\"The number of passengers for which the flight schedule is required.\\",\\n              \\"type\\": \\"int\\",\\n              \\"default\\": 1\\n            }\\n          },\\n          \\"required\\": [\\n            \\"route_id\\",\\n            \\"string\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    },\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"Get Auditor Information\\",\\n        \\"description\\": \\"Retrieve information about auditors from the Business Software domain.\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"roac\\": {\\n              \\"description\\": \\"The name or identifier of the auditor or group of auditors.\\",\\n              \\"type\\": \\"string\\"\\n            }\\n          },\\n          \\"required\\": [\\n            \\"roac\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    },\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"create_client\\",\\n        \\"description\\": \\"Create a new client in the Business Software domain\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"client_email\\": {\\n              \\"description\\": \\"Email address of the new client\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"client_lastname\\": {\\n              \\"description\\": \\"Last name of the new client\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"client_firstname\\": {\\n              \\"description\\": \\"First name of the new client\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"client_pass\\": {\\n              \\"description\\": \\"Password for the new client\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"client_login\\": {\\n              \\"description\\": \\"Login credentials for the new client\\",\\n              \\"type\\": \\"string\\"\\n            }\\n          },\\n          \\"required\\": [\\n            \\"client_email\\",\\n            \\"client_lastname\\",\\n            \\"client_firstname\\",\\n            \\"client_pass\\",\\n            \\"client_login\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    },\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"Get Finance Rates\\",\\n        \\"description\\": \\"Retrieves a list of finance rates for a specific location.\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"loc\\": {\\n              \\"description\\": \\"The location for which to retrieve finance rates.\\",\\n              \\"type\\": \\"string\\",\\n              \\"default\\": \\"94105\\"\\n            }\\n          },\\n          \\"required\\": [\\n            \\"loc\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    },\\n    {\\n      \\"type\\": \\"function\\",\\n      \\"function\\": {\\n        \\"name\\": \\"Get User Document Status Summary\\",\\n        \\"description\\": \\"Retrieves a summary of a user's document status within the business software domain.\\",\\n        \\"parameters\\": {\\n          \\"type\\": \\"dict\\",\\n          \\"properties\\": {\\n            \\"user_id\\": {\\n              \\"description\\": \\"Unique identifier of the user\\",\\n              \\"type\\": \\"string\\"\\n            },\\n            \\"document_id\\": {\\n              \\"description\\": \\"Unique identifier of the document\\",\\n              \\"type\\": \\"string\\"\\n            }\\n          },\\n          \\"required\\": [\\n            \\"user_id\\",\\n            \\"document_id\\"\\n          ]\\n        },\\n        \\"required\\": null\\n      }\\n    }\\n  ]\\n}\\n\`\`\`","/content/glossary/L1.md":"---\\nterm: L1 Regularization (Lasso)\\ntags: [\\"machine_learning\\"]\\n---\\n\\nA method of penalizing weights proportional to their L1 norm, the sum of their absolute values (Manhattan Distance). Pushes weights to zero, encourages sparsity.\\n\\n\$\$\\n\\\\text{Loss}_{\\\\text{total}} = \\\\text{Loss}_{\\\\text{data}} + \\\\lambda \\\\sum_i |w_i|\\n\$\$\\n\\nWhere:\\n- \$\\\\text{Loss}_{\\\\text{total}}\$: The final objective function to be minimized.\\n- \$\\\\text{Loss}_{\\\\text{data}}\$: The original loss function (e.g., MSE, Cross-Entropy) measuring the error on the training data.\\n- \$\\\\lambda\$ (Lambda): The regularization strength hyperparameter. Controls the trade-off between fitting the data and keeping weights small.\\n- \$\\\\sum_i |w_i|\$: The L1 norm of the weight vector.","/content/glossary/L2.md":"---\\nterm: L2 Regularization (Ridge)\\ntags: [\\"machine_learning\\"]\\n---\\n\\nA method of penalizing weights proportional to their L1 norm, the sum of their absolute values (Manhattan Distance). Pushes weights to zero, encourages sparsity.\\n\\n\$\$\\n\\\\text{Loss}_{\\\\text{total}} = \\\\text{Loss}_{\\\\text{data}} + \\\\lambda \\\\sum_i |w_i|\\n\$\$\\n\\nWhere:\\n- \$\\\\text{Loss}_{\\\\text{total}}\$: The final objective function to be minimized.\\n- \$\\\\text{Loss}_{\\\\text{data}}\$: The original loss function (e.g., MSE, Cross-Entropy) measuring the error on the training data.\\n- \$\\\\lambda\$ (Lambda): The regularization strength hyperparameter. Controls the trade-off between fitting the data and keeping weights small.\\n- \$\\\\sum_i |w_i|\$: The L1 norm of the weight vector.","/content/glossary/Poisson.md":"---\\nterm: Poisson Distribution\\ntags: [\\"statistics\\"]\\n---\\n\\nA discrete probability distribution that expresses the probability of a given number of events occurring in a fixed interval of time or space if these events occur with a known constant mean rate and independently of the time since the last event. \\n\\nThe probability of observing exactly \$k\$ events is given by the formula:\\n\\n\$\$\\nP(X=k) = \\\\frac{e^{-\\\\lambda} \\\\lambda^k}{k!}\\n\$\$\\n\\nWhere:\\n* \$k\$: The actual number of events we are interested in.\\n* \$\\\\lambda\$: The average number of events per interval (the rate parameter).\\n* \$e\$: Euler's number (approximately 2.71828).\\n* \$k!\$: The factorial of \$k\$.","/content/glossary/SEAM.md":"---\\nterm: SEAM\\n---\\n\\nIt has been demonstrated that standard CAMs fail to cover entire objects as they are translation and transformation invariant[@wang2020selfsupervisedequivariantattentionmechanism]. The localization and segmentation we seek require equivariance, where masks must alongside augmentation. Yude Wang et al. introduced Self-supervised Equivariant Attention Mechanism (SEAM) and Equivariant Cross Regularization (ECR) loss, taking the original image, generating its CAM, and then apply a spatial transformation \$T\$. \$T\$ is then applied on the input, we yield the second CAM, and enforce on the loss that these two pathways yield the exact same spatial tensor:\\n\\n\$\$\\nL_{ECR} = || M(T(x)) - T(M(x)) ||_2^2 \\\\tag{1}\\n\$\$\\n\\nBy adding this to the standard cross-entropy loss, we force the network to produce stable object localizations rather than peaked activations that shift wildly when the image is augmented.\\n\\nIn the original implementation by Yude Wang et al., rotation and translation failed to produce sufficient supervision, while rescaling added major results (\$47.43\\\\%\$ to \$55.41\\\\%\$).\\n","/content/glossary/WSOL.md":"---\\nterm: \\"WSOL\\"\\ntags: [\\"Computer Vision\\"]\\n---\\n\\nWeakly Supervised Object Localization (WSOL) is a task where we try to locate objects in an image using only image-level classification labels rather than detailed bounding boxes or masks.","/content/glossary/WSSS.md":"---\\nterm: \\"WSSS\\"\\ntags: [\\"Computer Vision\\"]\\n---\\n\\n Weakly-Supervised Semantic Segmentation (WSSS) is a task where the data lacks pixel-level labels and masks, and the modeling must learn an alternative. Both of these domains apply to our problems, and there is significant literature available.","/content/glossary/amortized-inference.md":"---\\nterm: Amortized Inference\\n---\\n\\nParametric Feedforward Networks","/content/glossary/backpropagation.md":"---\\nterm: \\"backpropagation\\"\\n---\\n\\nThe fundamental algorithm for training artificial neural networks by efficiently calculating gradients of the loss function with respect to network weights using the chain rule.\\n\\nYou can see a fully-derived backpropogation example on both a sigmoid and softmax-output neural network [here](/appendices/backpropagation).","/content/glossary/beam-search-decoding.md":"---\\nterm: Beam-search decoding\\n---","/content/glossary/chain-parsing.md":"---\\nterm: \\"Chain Parsing (CSP Topology)\\"\\n---\\n\\nThe real-time translation of Unix shell operators \`(|, &&, ||, ;)\` into a simplified, linear architecture of Communicating Sequential Processes (CSP). Rather than the LLM orchestrating multiple independent function calls, Chain Parsing allows the agent to construct an on-the-fly execution graph within a single string constraint. This relies heavily on the Rule of Composition, passing data seamlessly from one process to the next.\\n\\nSee [@hoare1985communicating], [@milner1992calculus] and [@raymond2003art] for more resources on the formalization of the subject.","/content/glossary/chunking-rag.md":"---\\nterm: chunking (rag)\\n---\\n\\nhttps://old.reddit.com/r/Rag/comments/1r47duk/we_benchmarked_7_chunking_strategies_most_best/\\n","/content/glossary/direct-pixel-optimization.md":"---\\nterm: Direct Pixel Optimization\\n---\\n\\nWe freeze a model's weights like [a ResNet10 classifier](/imagenet-mla100), feed it a low-resolution image, set \`input_batch.requires_grad = True\`, and define a structural loss function, we can optimize the image directly:\\n\\n\$\$\\nx_{t+1} = x_t - \\\\alpha \\\\frac{\\\\partial \\\\mathcal{L}}{\\\\partial x_t}\\n\$\$\\n\\nDeep Image Prior [@Ulyanov_2020] for image restoration tasks. However, there is another more optimal modeling for such tasks called Parametric Feedforward Networks.","/content/glossary/discriminative-region-problem.md":"---\\nterm: Discriminative Region Problem\\n---\\n\\nWhen a standard classifier ends up only locating the most distinguishing features in order to output a confident classification, omitting other important traits.","/content/glossary/dmat.md":"---\\nterm: \\"Dynamic Masking Augmentation Techniques\\"\\ntags: [\\"Computer Vision\\", \\"Data Augmentation\\"]\\n---\\n\\nA limitation of the Park et al. formalization is that dynamic masking techniques, such as PuzzleMix [@kim2020puzzlemixexploitingsaliency] and AutoMix [@liu2022automixunveilingpowermixup] cannot be formally explained by their framework, as their theorem relies on the mask being stochastic and independent of pixel values. When we add pixel-level awareness, we can no longer approximate loss function as a straightforward input gradient.\\n\\nEmpirically, though they achieve state-of-the-art results against MixUp and CutMix in selected setups, the overall impact on head class prediction is small. These techniques also take signficantly more compute per batch than stochastic techniques.\\n","/content/glossary/exponential-moving-average.md":"---\\nterm: Exponential Moving Average\\n---\\n\\nAfter every single training step, we update the shadow model by taking a massive fraction of its past self, and adding a tiny fraction of the new active weights:\\n\\n\$\$\\n\\\\theta_{ema}^{(t)} = \\\\beta \\\\cdot \\\\theta_{ema}^{(t-1)} + (1 - \\\\beta) \\\\cdot \\\\theta^{(t)}\\n\$\$","/content/glossary/f1score.md":"---\\nterm: \\"F1 score\\"\\n---\\n\\nHarmonic mean of Precision and Recall. We use it when we want a single metric that balances both, especially when we have an uneven class distribution.\\n\\n\$\$\\nF1 = 2 \\\\cdot \\\\frac{\\\\text{Precision} \\\\cdot \\\\text{Recall}}{\\\\text{Precision} + \\\\text{Recall}}\\n\$\$\\n\\n\$\$\\nF1 = \\\\frac{2TP}{2TP + FP + FN}\\n\$\$","/content/glossary/fpr.md":"---\\nterm: False Positive Rate (FPR)\\n---\\n\\n\$\$\\n\\\\text{FPR} = \\\\frac{FP}{FP + TN}\\n\$\$","/content/glossary/genaug.md":"---\\nterm: \\"Generative Image Augmentation\\"\\ntags: [\\"Computer Vision\\", \\"Data Augmentation\\"]\\n---\\n\\nEarlier work has shown that using diffusion models to synthesize and augment data improves classification results on ImageNet [@azizi2023syntheticdatadiffusionmodels; @trabucco2025effectivedataaugmentationdiffusion]. Given the latest developments in image generation models and abilities, these have moved to more sophisticated enhancements, such as background diversification, and saliency-aware generation pipelines [@rahat2024dataaugmentationimageclassification; @chen2025xverseconsistentmultisubjectcontrol; @zhao2025salient]. Generally, these techniques isolate the ground-truth subject via segmentation or feature-extraction, and use the generative model as as an augmenter build the surrounding context and handle the blending.\\n","/content/glossary/greedy-decoding.md":"---\\nterm: Greedy Decoding\\n---\\n\\n","/content/glossary/imagenet.md":"---\\nterm: ImageNet\\nterms: [\\"Computer Vision\\", \\"Datasets\\"]\\n---\\n\\nImageNet [@5206848] is a large-scale visual dataset designed for object recognition research. It became foundational to modern computer vision, especially after the breakthrough of University of Toronto’s team in the 2012 ImageNet Large Scale Visual Recognition Challenge using AlexNet [@10.5555/2999134.2999257]. The original dataset includes 14 million images and 21,841 synsets (classes), though teams often evaluate on the ILSVRC Subset benchmark [@ILSVRC15] consisting of 1.2 million training images and 1,000 classes. \\n\\nThe original ImageNet images were not exhaustively labeled. An image labeled “dog” might also contain trees, cars, or people. It is single-label per image. ILSVRC was essential for adding stricter quality control, as well as bounding box and object localization for more nuanced identification.\\n","/content/glossary/inceptionv3.md":"---\\nterm: Inception-v3\\n---\\n\\nInception-v3 is a 48-layer deep convolutional neural network (CNN) for image classification, developed by Google in 2016 to improve accuracy while reducing computational cost.\\n\\nIntroduced label smoothing.","/content/glossary/jetson-agx-orin.md":"---\\nterm: \\"Jetson AGX Orin\\"\\ntags: [\\"Hardware\\"]\\n---\\n\\nHardware from Nvidia.","/content/glossary/linear-attention.md":"---\\nterm: \\"Linear Attention\\"\\n---\\n\\nFaithful transformers implement softmax on attention layers. This introduces quadratic complexity, and there are modern techniques to approximate it and reduce complexity to linear time.\\n\\n[@xu2026softmaxlinearattentionreclaiming]","/content/glossary/linear-scaling-law.md":"---\\nterm: Linear Scaling Law\\n---\\n\\nBatchsize versus learning rate dynamics[@goyal2018accuratelargeminibatchsgd]:\\n\\nIf we multiply the batch size by a factor of \$k\$, we must also multiply the learning rate by \$k\$:\\n\\n\$\$\\n\\\\text{lr}_{new} = \\\\text{lr}_{old} \\\\times \\\\frac{N_{new}}{N_{old}}\\n\$\$","/content/glossary/msda-regularization.md":"---\\nterm: \\"MSDA Regularization\\"\\n---\\n\\nMixup blends images globally across all pixels, creating semi-transparent ghost images, hampering structural awareness. MixUp-CAM [@chang2020mixupcamweaklysupervisedsemanticsegmentation] is an introduced technique to use formalize uncertainty regularization constraints:\\n\\n\$\$\\n\\\\mathcal{L}_{all} = \\\\mathcal{L}_{cls}(I^{\\\\prime}, Y^{\\\\prime}) + \\\\lambda_{em}\\\\mathcal{L}_{em}(I^{\\\\prime}) + \\\\lambda_{con}\\\\mathcal{L}_{con}(M)\\n\$\$\\n\\nThis formula combines a classification loss, class-wise entropy regularization, and spatial concentration loss to optimize the MixUp procedure, and prevent the response from being too divergent.\\n\\nCutMix slready enforces spatial formalization through its geometry, such as feature exploration and spatial integrity. There is some research into techniques like semantic proportioning, making the augmentation differentiable, and using dynamic view-scales crops [@huang2020snapmixsemanticallyproportionalmixing; @10.1109/TMM.2023.3326300; @Kim_2024] to incrementally improve augmentations. These gains are incremental and selected, whereas the original CutMix usually suffices and is the common benchmark.\\n","/content/glossary/msda.md":"---\\nterm: \\"Mixed-Sample Data Augmentation\\"\\ntags: [\\"Computer Vision\\", \\"Data Augmentation\\"]\\n---\\n\\nIn 2022, Park et al. provided a unified formal treatment of mixed-sample data augmentation methods (MSDA) [@park2022unifiedanalysismixedsample], demonstrating that such techniques were equivalent to designing a spatial decay kernel for gradient regularization, including [CutMix](https://www.emergentmind.com/topics/cutmix) [@yun2019cutmixregularizationstrategytrain] and MixUp [@Zhang2018mixup]. Each technique posseses their own strengths and limitations. For example, CutMix may introduce multi-label noise, erasing a class that only existed in the cutout area, or introduces a new class that isn't actually present in the pasted patch. There are some further static enhancements on this techniques, such as Fourier Mix (FMix)[@harris2021fmixenhancingmixedsample], which produces smooth and continuous patches instead of sharp ones, and ResizeMix [@qin2020resizemixmixingdatapreserved], which resizes the patching image instead of cropping.  \\n\\nThe Park et al. formalization demonstrates how MSDA reshapes the loss landscape, mathematically forcing it to learn smoother functions by penalizing erratic changes in its input gradients, weighted by how close the data points are (spatial decay). The core of the theorem relies on the stochastic nature of applicable image augmentation techniques. They used their theorems to formalize Hybrid Mix (HMix) and Gaussian Mix (GMix), intermediate spatial regularization techniques to sit between CutMix and MixUp distributions.\\n","/content/glossary/n-gram-models.md":"---\\nterm: \\"N-Gram Modeling\\"\\n---\\n\\nLanguage modeling has evolved from discrete statistical counting to continuous neural representation. Statistical n-gram models, first demonstrated by Claude Shannon in 1948 [@shannon1948mathematical], estimate word probabilities based on raw frequency counts observed in a training corpus. These models inherently suffer from the data sparsity, in which sequences not seen during training receive a zero probability. We address this by applying Add-k smoothing, an technique used to reassigns probability mass to unseen events to ensure the model remains functional.\\n\\nIn 2003, Neural Probabilistic Language Models were introduced by Bengio et al [@NIPS2000_728f206c]. They replaced discrete counts with word embeddings, allowing neural models solve sparsity through interpolation within embedding space, mapping similar vector coordinates together. This allows for generalization beyond the specific sequences encountered during training.","/content/glossary/nucleus-sampling.md":"---\\nterm: Nucleus Sampling\\n---","/content/glossary/parametric-feedforward-networks.md":"---\\nterm: Parametric Feedforward Networks\\n---\\n\\n\\nWe feed models a low-resolution input \$x_{LR}\$, and it outputs a high-resolution prediction \$\\\\hat{x}_{HR}\$:\\n\\n\$\$\\n\\\\hat{x}_{HR} = \\\\mathcal{F}(x_{LR}, \\\\theta)\\n\$\$\\n\\nDuring training, we calculate the loss between our prediction and the ground-truth high-res image \$y_{HR}\$. We backpropagate to update the weights, not pixels:\\n\\n\$\$\\n\\\\theta_{new} = \\\\theta_{old} - \\\\alpha \\\\frac{\\\\partial \\\\mathcal{L}(\\\\hat{x}_{HR}, y_{HR})}{\\\\partial \\\\theta}\\n\$\$\\n\\namortized inference","/content/glossary/perceptual-loss.md":"---\\nterm: Perceptual Loss\\n---\\n\\nPerceptual loss for super resolution:[@johnson2016perceptuallossesrealtimestyle]\\n\\nWe extract the activation maps \$a^{[l]}\$ from deep inside the frozen network (e.g., the output of layer3) and compute the loss between the feature representations, not the pixels:\\n\\n\$\$\\n\\\\mathcal{L}_{perceptual} = \\\\frac{1}{C_l H_l W_l} || \\\\mathcal{E}_{frozen}^{(l)}(\\\\hat{y}) - \\\\mathcal{E}_{frozen}^{(l)}(y) ||_2^2\\n\$\$","/content/glossary/post-training.md":"---\\nterm: Post-Training\\n---\\n\\nPost training [@rank2026posttrainbenchllmagentsautomate]","/content/glossary/precision.md":"---\\nterm: \\"precision (metric)\\"\\n---\\n\\n> You're fishing with a net. You use a wide net, and catch 80 of 100 total fish in a lake. That's 80% recall. But you also get 80 rocks in your net. That means 50% precision, half of the net's contents is junk. You could use a smaller net and target one pocket of the lake where there are lots of fish and no rocks, but you might only get 20 of the fish in order to get 0 rocks. That is 20% recall and 100% precision.\\n\\n\$\$\\n\\\\text{Precision} = \\\\frac{TP}{TP + FP}\\n\$\$\\n\\n","/content/glossary/prompt-engineering.md":"---\\nterm: \\"Prompt Engineering\\"\\n---\\n\\n## Abstract \\n\\nIn many real-world applications, Large Language Models (LLMs) are used to reason over structured tabular data rather than plain text. Examples include risk assessment, customer churn prediction, and medical triage systems. We investigate whether advanced prompt engineering strategies improve LLM performance when making predictions from structured data. We use LLMs for a tabular reasoning task, design and compare prompt engineering techniques, evaluate predictions using classification metrics, and analyze where LLM reasoning fails. Full code implementation and data is available on [github](https://github.com/bencejdanko/llm-tabular-titanic).  \\n\\n## Prompting Techniques\\n\\nWe have documented all prompt techniques used:\\n\\n- System-prompt: Sample available Appendix \\\\ref{sec:titanic-system}\\n- Zero-shot: Sample available Appendix \\\\ref{sec:titanic-zero-shot}\\n- 5-shot: Sample available Appendix \\\\ref{sec:titanic-5-shot}\\n- Chain-of-Thought (CoT): Sample available Appendix \\\\ref{sec:titanic-cot}\\n- Self-consistency: Sample available Appendix \\\\ref{sec:titanic-self-consistency}\\n- Tree-of-Thought: Sample available Appendix \\\\ref{sec:titanic-tot}\\n\\n## Results\\n\\nTable: Results Table [!h]\\n| LLM | Prompting Method | Accuracy | Precision | Recall | F1 |\\n| --- | --- | --- | --- | --- | --- |\\n| google/gemini-3-flash-preview | Zero-shot | **0.990** | 0.994709 | **0.979167** | **0.986877** |\\n| google/gemini-3-flash-preview | Five-shot | 0.988 | **1.000000** | 0.968750 | 0.984127 |\\n| google/gemini-3-flash-preview | CoT | 0.982 | 0.989305 | 0.963542 | 0.976253 |\\n| google/gemini-3-flash-preview | Self-consistency (3) | 0.986 | **1.000000** | 0.963542 | 0.981432 |\\n| google/gemini-3-flash-preview | ToT | 0.974 | 0.994475 | 0.937500 | 0.965147 |\\n| openai/gpt-4.1-nano | Zero-shot | 0.780 | 0.879630 | 0.494792 | 0.633333 |\\n| openai/gpt-4.1-nano | Five-shot | 0.776 | 0.785714 | 0.572917 | 0.662651 |\\n| openai/gpt-4.1-nano | CoT | 0.692 | 0.588785 | 0.656250 | 0.620690 |\\n| openai/gpt-4.1-nano | Self-consistency (3) | 0.758 | 0.669856 | 0.729167 | 0.698254 |\\n| openai/gpt-4.1-nano | ToT | 0.616 | 0.000000 | 0.000000 | 0.000000 |\\n\\n: Full comparison results table comparing all prompting techniques. \\n\\n![alt text](image-2.png \\"Confusion Matrices for Gemini Flash 3 Preview on the Kaggle Titanic dataset\\")\\n\\n![alt text](image-3.png \\"Confusion Matrices for GPT 4.1 Nano on the Kaggle Titanic dataset\\")\\n\\n### Hard Case Analysis\\n\\n#### gemini-3-flash-preview\\n\\nFull reasoning traces for 9 missclassified samples for Gemini 3 Flash are at Appendix \\\\ref{sec:titanic-results-gemini}. \\n\\nThe model performed slightly worse when prompted for greater reasoning, overthinking on our system information. The model primarily missed 3rd-class males of whom survived, passengers of ID 82, 205, 268, 745 and 401. Passenger 808, an 18-year-old 3rd class female, was predicted to have survived, but did not, which was a statistical anomaly. The model primarily made these misclassifications due to particular statistical assumption priors. However, the mode explicitly hallucinates passenger ID 70 as a \\"documented historical anomaly\\" whom survived, though this is false.\\n\\nThe Gemini model is exceptionally more accurate, faster and at higher availability than other SOTA models. It's likely it was pre-trained on this particular problem. The next highest achiever was openai/gpt-5.2-chat (missed logging it) at 85% accuracy using zero-shot. Because of this, I believe Gemini likely has easily-accessible parametric knowledge about this particular dataset, and that our particular prompts were able to elicit the particular pre-training configuration it was trained on.\\n\\n#### gpt-4.1-nano\\n\\nFull reasoning traces for 9 missclassified samples for GPT 4.1 Nano at Appendix \\\\ref{sec:titanic-results-nano}.\\n\\nOur system prompt elicited the model to consider anomalies in survival, and thus some reasoning responses directly contradicted known statistical knowledge about the event. For example, for passengers 55 and 140, higher-class males were predicted to have survived, despite them having greater statistical likelihood of dying. The model also came to underestimate 3rd-class women traveling alone. Overall, enhanced reasoning degraded model performance, where the shorter prompts likely engaged activations with more dependence on direct statistical assumptions.\\n","/content/glossary/recall.md":"---\\nterm: \\"recall (metric)\\"\\n---\\n\\n> You're fishing with a net. You use a wide net, and catch 80 of 100 total fish in a lake. That's 80% recall. But you also get 80 rocks in your net. That means 50% precision, half of the net's contents is junk. You could use a smaller net and target one pocket of the lake where there are lots of fish and no rocks, but you might only get 20 of the fish in order to get 0 rocks. That is 20% recall and 100% precision.\\n\\nAlso just the True Positive Rate (TPR).\\n\\n\$\$\\n\\\\text{Recall} = \\\\frac{TP}{TP + FN}\\n\$\$","/content/glossary/regularization.md":"---\\nterm: \\"Regularization\\"\\ntags: [\\"Deep Learning\\", \\"Machine Learning\\"]\\n---\\n\\n300 samples per class is small, making Stochastic Gradient Descent (SGD) inherently difficult to land reliably. The sample complexity is just too low for SGD to reliably find flat, generalizable minima. We have to find a regularization strategy that helps us mitigate our limitations and prevent a sharp minima (overfitting). This forces us into a situation in which we must squeeze out every state-of-the-art regularization technique we can do to make the data as meaningful as possible.\\n","/content/glossary/single-tool-hypothesis.md":"---\\nterm: The Single-Tool Hypothesis\\n---\\n\\nAn agent design paradigm stating that a unified string-composition interface outperforms a catalog of highly typed, discrete function calls. By collapsing function selection into command syntax, the framework shifts the LLM's cognitive load away from schema mapping (context-switching) and toward natural language generation (CLI syntax), which is highly represented in its training data. [A full report was developed by a backend lead at Manus describing the concept](/appendices/manus-lead). [Smolagents from Huggingface](https://github.com/huggingface/smolagents) approaches the same idea with Python.\\n\\nSee [Chain Parsing (CSP Topology)](#chain-parsing-csp-topology).","/content/glossary/skip-connections.md":"---\\nterm: Skip Connections\\n---\\n\\nIn [classical hidden layer backprop calculations](/appendices/backpropagation), we focused heavily on calculating gradients to update our weights, solvings \$\\\\frac{\\\\partial L}{\\\\partial W}\$. To mathematically reach a weight matrix deep in the early layers of the network, the error signal from the loss function must first survive the journey through all the intermediate activations above it.\\n\\n\$\$\\n\\\\frac{\\\\partial L}{\\\\partial a^{[l]}} = \\\\sum \\\\left( \\\\dots \\\\cdot W^{[l+2]} \\\\cdot \\\\sigma'(Z^{[l+1]}) \\\\cdot W^{[l+1]} \\\\right)\\n\$\$\\n\\nWe multiply by the weight matrix \$W^{[l]}\$ and the activation derivative \$\\\\sigma'(Z^{[l]})\$ at every single layer. When \$\\\\sigma'\$ is \$< 1\$, or initialized weights are small, terms multiply together and decay exponentially towards zero, causing the vanishing gradient problem.\\n\\nWhen we add skip connections [@he2015deepresiduallearningimage] ([See our ResNet10 classifier](/imagenet-mla100)), we add the input \$a^{[l]}\$ as a residual:\\n\\n\$\$\\nZ^{[l+1]} = \\\\mathcal{F}(a^{[l]}, W^{[l+1]}) + a^{[l]}\\n\$\$\\n\\n\$\\\\mathcal{F}\$ represents the composite function of all operations. We take the input \$a^{[l]}\$, pass it through our architecture \$\\\\mathcal{F}\$, and add the result back to the original input.\\n\\nDuring backpropagation, we want to pass the gradient of the loss \$L\$ back to \$a^{[l]}\$. Applying the chain rule:\\n\\n\$\$\\n\\\\frac{\\\\partial L}{\\\\partial a^{[l]}} = \\\\frac{\\\\partial L}{\\\\partial Z^{[l+1]}} \\\\cdot \\\\frac{\\\\partial Z^{[l+1]}}{\\\\partial a^{[l]}}\\n\$\$\\n\\nNow, let's expand the local derivative \$\\\\frac{\\\\partial Z^{[l+1]}}{\\\\partial a^{[l]}}\$ based on our residual equation:\\n\\n\$\$\\n\\\\frac{\\\\partial Z^{[l+1]}}{\\\\partial a^{[l]}} = \\\\frac{\\\\partial}{\\\\partial a^{[l]}} \\\\left( \\\\mathcal{F}(a^{[l]}, W^{[l+1]}) + a^{[l]} \\\\right)\\n\$\$\\n\\n\$\$\\n\\\\frac{\\\\partial Z^{[l+1]}}{\\\\partial a^{[l]}} = \\\\frac{\\\\partial \\\\mathcal{F}}{\\\\partial a^{[l]}} + 1\\n\$\$\\n\\nSubstitute this back into the chain rule:\\n\\n\$\$\\n\\\\frac{\\\\partial L}{\\\\partial a^{[l]}} = \\\\frac{\\\\partial L}{\\\\partial Z^{[l+1]}} \\\\left( \\\\frac{\\\\partial \\\\mathcal{F}}{\\\\partial a^{[l]}} + 1 \\\\right)\\n\$\$\\n\\n\$\$\\n\\\\frac{\\\\partial L}{\\\\partial a^{[l]}} = \\\\frac{\\\\partial L}{\\\\partial Z^{[l+1]}} \\\\frac{\\\\partial \\\\mathcal{F}}{\\\\partial a^{[l]}} + \\\\frac{\\\\partial L}{\\\\partial Z^{[l+1]}}\\n\$\$\\n\\nThe first term, \$\\\\frac{\\\\partial L}{\\\\partial Z^{[l+1]}} \\\\frac{\\\\partial \\\\mathcal{F}}{\\\\partial a^{[l]}}\$, represents the standard gradient flowing through the weights of the convolutional layers. In a deep network, this term might still vanish to zero.\\n\\nThe second term, \$+ \\\\frac{\\\\partial L}{\\\\partial Z^{[l+1]}}\$, is same gradient from the layer above, passing completely through the + operator. Because the gradient is added rather than multiplied, the loss landscape becomes smoother.\\n\\nInstead of forcing \$\\\\mathcal{F}\$ to learn a new representation of data, \$x\$ carries historical information forward. \$\\\\mathcal{F}\$ is now responsible for learning the residual needed to improve the current representation. If a particular layer decides it doesn't need to learn anything new, the optimizer pushes the weights of \$\\\\mathcal{F}\$ toward zero. The output becomes \$Z^{[l+1]} = 0 + x = x\$.\\n\\n","/content/glossary/sparse-moe.md":"---\\nterm: \\"Sparse mixture-of-expert models\\"\\ntags: [\\"LLM\\", \\"Transformers\\"]\\n---\\n\\nSparsely activated MoE Models.","/content/glossary/top-k-sampling.md":"---\\nterm: Top-K Sampling\\n---","/content/projects/bert-tweeteval.md":"---\\ntitle: \\"Bert-TweetEval\\"\\ndescription: \\"BERT is an encoder-transformer based architecture that is more suitable for some tasks, such as classification. We benchmark both base and fine-tuned performance trained on the TweetEval dataset.\\"\\ntags: [\\"Transformers\\"]\\ngithub: \\"https://github.com/bencejdanko/bert-tweeteval\\"\\npubDate: 2026-03-05\\nadditionalLinks:\\n  - label: \\"Hugging Face\\"\\n    url: \\"https://huggingface.co/bdanko\\"\\n  - label: \\"Technical Report\\"\\n    url: \\"/bencejdanko/bert-tuning\\"\\n---\\n\\n- Benchmarked and optimized lightweight Transformer architectures (DistilBERT, DistilRoBERTa) for multi-class emotion classification, achieving high-fidelity results (\$0.79\$ Accuracy) on imbalanced Twitter datasets.\\n- Engineered a robust \\"Stress-Testing\\" framework to evaluate model resilience against distribution shifts, including character-level typos, emoji removal, and hashtag splitting.\\n- Conducted comparative analysis between Encoder (BERT) and Decoder (Qwen-3, GPT-4o-mini) models, demonstrating that structured prompting allows 4B-parameter open-source models to rival closed-source SOTA performance.\\n- Optimized model reliability by analyzing Expected Calibration Error (ECE) and implementing Macro-F1 early stopping to mitigate dataset imbalance and overconfidence.\\n- Performed deep error analysis using token-level inspection to identify failures in subword tokenization (WordPiece/BPE) for misspelled emotional keywords, proposing Counterfactual Data Augmentation (CDA) as a solution.","/content/projects/cadence.md":"---\\ntitle: Cadence.md\\ndescription: >-\\n  Notion/Obsidian clone attempt, a WYSIWYG editor, slash web deployment platform\\n  created from notes\\ntags:\\n  - Full Stack Development\\n  - Svelte\\ngithub: 'https://github.com/bencejdanko/cadence.md'\\npubDate: 2025-03-02T00:00:00.000Z\\n---\\n\\n- Developed a WYSIWYG rich-text editor inspired by Notion and Obsidian, exploring modular plugin-based architectures.\\n- Investigated real-time note-taking capabilities and state-machine lexical scanning for fast Markdown rendering.\\n","/content/projects/card-transactions-kafka-flink-mongo.md":"---\\ntitle: Realtime Credit Card Transactions Analysis\\ndescription: >-\\n  A mock pipeline to simulate a stream of credit card transactions. Kafka, Flink\\n  and MongoDB are used for real time analysis and storage.\\ntags:\\n  - Big Data\\n  - Kafka\\n  - Flink\\n  - MongoDB\\ngithub: 'https://github.com/bencejdanko/card-transactions-kafka-flink-mongo'\\npubDate: 2025-03-05T00:00:00.000Z\\n---\\n\\n- Architected a real-time data pipeline architecture simulating live credit card transaction streams using Kafka stream configurations.\\n- Integrated Apache Flink to analyze transaction records dynamically, executing complex event queries with persistent fast memory profiles.\\n- Utilized MongoDB for fast retrieval storage of structured transaction logs natively.\\n","/content/projects/carillo-social.md":"---\\ntitle: Carillo Social\\ndescription: >-\\n  Instagram-style social app for cars. Developed as part of the\\n  startup-accelerator Zinnstarter program.\\ntags:\\n  - Mobile Development\\n  - React Native\\n  - Pocketbase\\ngithub: 'https://github.com/bencejdanko/carillo-social-mobile-app'\\npubDate: 2024-03-04T00:00:00.000Z\\n---\\n\\n- Developed a social media application featuring an Instagram-inspired UI using React Native (Expo) supporting cross-platform releases.\\n- Implemented secure user authentication with PocketBase backends handling real-time data synchronizations securely.\\n- Explored startup development patterns under the Zinnstarter program designing fully interactive prototypes natively.\\n","/content/projects/carillo.md":"---\\ntitle: Carillo CMS\\ndescription: >-\\n  A web-based car dealership management system (CMS). Developed as part of the\\n  startup-accelerator Zinnstarter program at San Jose State University (SJSU)\\n  for Spring 2024 using modern web frameworks.\\ntags:\\n  - Web Development\\n  - SvelteKit\\n  - React Native\\n  - Pocketbase\\ngithub: 'https://github.com/bencejdanko/carillo'\\npubDate: 2024-03-03T00:00:00.000Z\\n---\\n\\n- Designed and prototyped a car dealership management system (CMS) leveraging Figma for high-fidelity interactive visual layouts.\\n- Explored full-stack tooling involving Svelte, SvelteKit, and Pocketbase integrations tailored for startup logistical operations.\\n- Formulated data structures addressing logistics endpoints delivering interactive dashboards effectively.\\n","/content/projects/edenova.md":"---\\ntitle: Edenova Dating App\\ndescription: Hinge-style dating app with SMS auth\\ntags:\\n  - Mobile Development\\n  - React Native\\ngithub: 'https://github.com/bencejdanko/edenova'\\npubDate: 2024-5-30\\n---\\n\\n- Developed a dating app prototype using React Native (Expo) and Appwrite backend-as-a-service natively.\\n- Implemented secure onboarding handlers utilizing Appwrite's SMS authentication API support streams.\\n- Styled layout updates supporting Dark Mode rendering utilizing NativeWind shadow frameworks natively.\\n","/content/projects/elevator-people-m55m1.md":"---\\ntitle: \\"M55M1 Elevator People Counting Industry Co-op with Nuvoton\\"\\ndescription: \\"We use the Nuvoton M55M1 and its Ethos-U55 NPU, the system to run optimized ML models directly on the device. We convert a top-down camera feed into a digital count without the latency or cost of cloud processing.\\"\\ntags: [\\"Computer Vision\\"]\\npubDate: 2026-03-18 7:00 PM\\ngithub: https://github.com/ai-ml-club-sjsu/m55m1-ElevatorCounting-YOLOv8n\\nadditionalLinks:\\n  - label: \\"technical report\\"\\n    url: \\"/edge-vision-smart-elevators-privacy-preserving-headcount-analysis\\"\\n  - label: \\"Project slide deck (Google Slides)\\"\\n    url: \\"https://drive.google.com/file/d/1-EslCMQwy6LEJvSZE6HPzA__op9BPLI_/view\\"\\n  - label: \\"Mid semester update (Google Slides)\\"\\n    url: \\"https://docs.google.com/presentation/d/1VIMKD61AjMdprpsx_YT1rGLoF8gYgVMDFezDNy4AeRE/edit?usp=sharing\\"\\n  - label: \\"Final semester update (Google Slides)\\"\\n    url: \\"https://docs.google.com/presentation/d/1evOnSVt-pa2huPeDn95CbpnRIeEg-gfVDcNNIBktUrk/edit?usp=sharing\\"\\n\\n---\\n\\n- Optimized and deployed a real-time person-counting system on a resource-constrained Nuvoton platform, achieving 15 FPS within a strict 1.5MB SRAM footprint.\\n- Engineered an INT8-quantized YOLOv8n pipeline using the Vera compiler and Arm Ethos-U55 NPU acceleration, leveraging Cortex-M55 Helium technology for efficient vector processing.\\n- Curated a specialized dataset of 13,000+ images from Roboflow, and additionally using a 160° FOV camera in real-world elevator environments; published the augmented dataset to HuggingFace for community use.\\n- Developed firmware using CMSIS-CSolution, integrating a custom Ultralytics training library to bridge the gap between high-level model training and low-level hardware execution.\\n- Collaborated with Nuvoton hardware engineers to validate system performance for a live demonstration at the Sensors Converge conference.","/content/projects/enterprise-rag-wixqa.md":"---\\ntitle: Enterprise Retrieval-Augmented Generation (RAG) with WixQA\\ndescription: >-\\n  We apply advanced techniques for building and evaluating Retrieval-Augmented\\n  Generation systems in enterprise environments.\\ntags:\\n  - Retrieval Augmented Generation\\n  - Python\\n  - Fixed Chunking\\n  - Semantic Chunking\\n  - Cerebras Systems API\\ngithub: 'https://github.com/bencejdanko/wixqa-rag'\\npubDate: 2026-03-16T00:00:00.000Z\\nadditionalLinks:\\n  - label: \\"Hugging Face Dataset\\"\\n    url: \\"https://huggingface.co/datasets/bdanko/wixqa-gpt-oss-120b-all-MiniLM-L6-v2-pgvector-evals\\"\\n  - label: \\"Technical Report\\"\\n    url: \\"/bencejdanko/enterprise-rag-wixqa\\"\\n---\\n\\n- Engineered an enterprise-scale RAG pipeline using the WixQA benchmark, processing the full training corpus of customer support queries and knowledge base articles.\\n- Systematically optimized retrieval performance by benchmarking 16+ combinations of chunking strategies (\$300\$-\$500\$ tokens) and overlap configurations, identifying the optimal balance for Context Recall.\\n- Architected a production-style stack utilizing PgVector with HNSW indexing, all-MiniLM-L6-v2 embeddings, and GPT-OSS-120B for high-fidelity response generation.\\n- Quantified system accuracy through an LLM-as-a-Judge framework, achieving a significant Context Recall increase (\$0.40 \\\\rightarrow 0.81\$) by tuning \$k\$-nearest neighbors and chunking parameters.\\n- Validated generated output using F1 and ROUGE-1 metrics to ensure token-level overlap and content coverage across over a hundred thousand of synthetic baseline runs by using the hyper-accelerated Cerebras API for inference.","/content/projects/flashcards-crud.md":"---\\ntitle: Flashcards CRUD Client\\ndescription: >-\\n  A basic CRUD client application for managing flashcard decks and corresponding\\n  questions and answers.\\ntags:\\n  - Full Stack Development\\n  - React\\n  - ShadCN\\n  - Pocketbase\\ngithub: 'https://github.com/bencejdanko/flashcards-crud-client'\\npubDate: 2024-9-12\\n---\\n\\n- Created a deck management client application supporting CRUD operations handling fast query persistence.\\n- Integrated PocketBase backends managing table relationships preserving user statistics securely.\\n","/content/projects/food-ordering-app-distributed.md":"---\\ntitle: Food Ordering App (distributed)\\ndescription: >-\\n  Food ordering app with administrative restaurant management, refactored for\\n  distributed workloads\\ntags:\\n  - Full Stack Development\\n  - Kubernetes\\n  - Kafka\\n  - MongoDB\\n  - Node\\n  - React\\ngithub: 'https://github.com/bencejdanko/uber-eats-clone-v1'\\npubDate: 2024-9-13\\n---\\n\\n- Architected a distributed microservices food platform converting configuration setups into scalable Docker containers.\\n- Formulated Kubernetes mappings deploying Kong gateways and node brokers reliably.\\n- Streamlined image registry builds securely preserving container setups efficiently.\\n","/content/projects/food-ordering-app-monolith.md":"---\\ntitle: Food Ordering App (monolith)\\ndescription: Food ordering app with administrative restaurant management.\\ntags:\\n  - Full Stack Development\\n  - React\\n  - Redux Toolkit/RTK\\n  - Node\\n  - MySQL\\n  - Sequelize\\n  - S3\\ngithub: 'https://github.com/bencejdanko/uber-eats-clone-v0'\\npubDate: 2024-9-12\\n---\\n\\n- Developed a full-stack food delivery application using Node.js/Express for API support and React with TypeScript.\\n- Utilized Sequelize ORM executing table migrations securely preserving data relationships efficiently.\\n- Integrated AWS S3 storing profile image uploads ensuring high-speed content delivery natively.\\n","/content/projects/geoattendance.md":"---\\ntitle: GeoAttendance\\ndescription: >-\\n  Users within geographical boundaries will be able to check-in (Browser\\n  Geolocation API). Upon checking-in, the users will receive an email which\\n  confirms their attendance status.\\ntags:\\n  - Web Development\\n  - React\\n  - Pocketbase\\ngithub: 'https://github.com/bencejdanko/geoattendance'\\npubDate: 2024-03-05T00:00:00.000Z\\n---\\n\\n- Developed a web application tracking attendee layouts utilizing Geofencing logic mapping browser boundary points.\\n- Integrated PocketBase to manage coordinates-verified logins with automatic email confirmation triggers securely.\\n- Formulated historical records addressing check-in layouts tailored for rapid attendee analytics natively.\\n","/content/projects/image-restoration-mla100.md":"---\\ntitle: \\"MLA100 Image Restoration\\"\\ndescription: \\"Image Restoration on Mobilint's MLA-100 Edge NPU\\"\\ntags: [\\"Deep Learning\\"]\\ngithub: \\"https://github.com/bencejdanko/image-restoration-mla100\\"\\npubDate: 2026-3-16\\nadditionalLinks:\\n  - label: \\"Hugging Face\\"\\n    url: \\"https://huggingface.co/bdanko\\"\\n  - label: \\"Technical Report\\"\\n    url: \\"/bencejdanko/image-restoration-mla100\\"\\n---\\n","/content/projects/imagenet-mla100-classification.md":"---\\ntitle: ImageNet MLA-100 NPU Classication\\ndescription: ImageNet Classification on Mobilint's MLA-100 Edge NPU\\ntags:\\n  - Deep Learning\\n  - ResNet10\\n  - NPU\\ngithub: 'https://github.com/bencejdanko/imagenet-classification-mobilint-mla-100'\\npubDate: 2026-3-04\\nadditionalLinks:\\n  - label: \\"Hugging Face\\"\\n    url: \\"https://huggingface.co/bdanko\\"\\n  - label: \\"Technical Report\\"\\n    url: \\"/bencejdanko/imagenet-mla100\\"\\n  - label: \\"Presentation (Google Slides)\\"\\n    url: \\"https://docs.google.com/presentation/d/1g-Vixhq60Ss3DknxclWUSer0FykJoz8zRX0nprP6WVk/edit?usp=sharing\\"\\n---\\n\\n- Benchmarked an ImageNet classifier tailored to perform high-speed edge inferencing on Mobilint MLA-100 NPU boards.\\n- Analyzed custom hardware layout inferencing accurately maintaining extreme low-latency performance thresholds.\\n","/content/projects/inclusive-world.md":"---\\ntitle: RBAC Portal Industry Co-op with Inclusive World\\ndescription: >-\\n  A full-stack role-based management portal for the Inclusive World non-profit\\n  team.\\ntags:\\n  - Web Development\\n  - Django\\n  - Postgres\\ngithub: 'https://github.com/rcc-sjsu/inclusive_world_portal'\\npubDate: 2026-01-31T00:00:00.000Z\\n---\\n\\n- Led a digital transformation for a non-profit, migrating a legacy Google Sheets infrastructure to a centralized PostgreSQL database and Django web application over an 8-month lifecycle, managing over 700 historical volunteers and members records.\\n- Directed a cross-functional team of 10 undergraduate developers from SJSU to prototype a React/Supabase MVP, later transitioning to a Django-based architecture to enhance backend stability and scalability.\\n- Architected a comprehensive Content Management System (CMS) featuring role-based access control (RBAC), custom dashboards for volunteers, and advanced administrative filtering tools.\\n- Engineered complex business logic for course registration, including Stripe API integration, automated attendance tracking, and dynamic reporting.\\n- Developed a sophisticated form engine with conditional logic to automate registration requirements and streamline data collection for staff and users.","/content/projects/kanjivg-stroke-classification.md":"---\\ntitle: \\"KanjiVG Stroke Classification\\"\\ndescription: \\"Fall 2023 project for my ML course. Classifying individual strokes derived from the KanjiVG dataset. The issue with standard CV classification is that strokes also have directional semantic meaning, which can't be captured with pure vision.\\"\\ntags: [\\"Machine Learning\\"]\\ngithub: \\"https://github.com/bencejdanko/kanjivg-stroke-classification\\"\\npubDate: 2024-1-11\\n---","/content/projects/kong-jwt-headers.md":"---\\ntitle: Kong JWT Claim Injection Plugin\\ndescription: >-\\n  This plugin enhances the standard Kong JWT authentication by automatically\\n  adding claims found within a validated JWT to the headers of the request sent\\n  to the upstream service.\\ntags:\\n  - Distributed Systems\\n  - Kong\\n  - Lua\\ngithub: 'https://github.com/bencejdanko/kong-plugin-jwt-claims-headers'\\npubDate: 2025-04-15T00:00:00.000Z\\n---\\n\\n- Designed a modified Kong JWT Authentication Plugin Injecting serializable claims into upstream request headers securely.\\n- Supported flat array layouts serializing JSON strings avoiding external Lua parsing library dependencies transparently.\\n","/content/projects/mancala-project.md":"---\\ntitle: Mancala board\\ndescription: >-\\n  A mancala board game developed with OO and MVC principles | Fall 2022 Object\\n  Oriented Course Project\\ntags:\\n  - Algorithms\\n  - Java\\n  - OOP\\ngithub: 'https://github.com/bencejdanko/MancalaProject'\\npubDate: 2022-09-11T00:00:00.000Z\\n---\\n\\n- Developed an interactive desktop Mancala board game using Object-Oriented principles and Model-View-Controller design patterns.\\n","/content/projects/manifests.md":"---\\ntitle: \\"Manifests\\"\\ndescription: \\"Kubernetes manifest files to easily self host at scale with ArgoCD. Includes configs for n8n, langflow, langfuse, loki + otel, mcp forge, getOutline, argo workflows, superset and more\\"\\ntags: [\\"DevOps\\"]\\ngithub: \\"https://github.com/bencejdanko/manifests\\"\\npubDate: 2026-02-15\\n---","/content/projects/markdown-to-latex-template.md":"---\\ntitle: Markdown to Latex Templates (IEEE)\\ndescription: >-\\n  A self-hosted HTTP API that compiles Markdown documents into PDFs using\\n  configurable LaTeX templates.\\ntags:\\n  - API\\n  - Latex\\n  - Node\\ngithub: 'https://github.com/bencejdanko/markdown-to-latex-template'\\npubDate: 2026-03-01T00:00:00.000Z\\n---\\n\\n- Built a self-hosted HTTP API compiling Markdown body logs into IEEE standard headers utilizing configuring Pandoc setups.\\n- Designed fast multipart handler endpoints accommodating bibliography files preserving asset integrity securely.\\n","/content/projects/markdown-transpiler.md":"---\\ntitle: Markdown Transpiler\\ndescription: >-\\n  A custom Markdown transpiler, initially built for a Svelte preprocessor.\\n  Inspired by a state-machine lexical scanning presentation by Rob Pike\\ntags:\\n  - Algorithms\\n  - Typescript\\ngithub: 'https://github.com/bencejdanko/markdown-transpiler'\\npubDate: 2024-09-11T00:00:00.000Z\\n---\\n\\n- Designed modular parsing systems mapping rule triggers transparently exploring Lexical scanning state machines properly.\\n","/content/projects/mcp-genanki.md":"---\\ntitle: MCP GenAnki\\ndescription: >-\\n  My personal MCP Server for using Anki with the Gemini CLI. Includes robust\\n  prompts to produce quality entries.\\ntags:\\n  - Agents\\n  - Python\\ngithub: 'https://github.com/bencejdanko/mcp-genanki'\\npubDate: 2025-12-26T00:00:00.000Z\\n---\\n\\n- Formulated an MCP driver loading card pushes mapping structured templates efficiently.\\n","/content/projects/msadi-quiz-app.md":"---\\ntitle: Quiz App for MSADI Students\\ndescription: A quiz app for MSADI students\\ntags:\\n  - Web Development\\n  - Astro\\ngithub: 'https://github.com/bencejdanko/quiz-platform'\\npubDate: 2026-02-15T00:00:00.000Z\\nadditionalLinks:\\n  - label: \\"Live Demo\\"\\n    url: \\"https://quiz.pasuko.com\\"\\n---\\n\\n- Designed a platform facilitating Markdown deployments addressing study guide renders efficiently.\\n","/content/projects/music-media-storage.md":"---\\ntitle: \\"Music Media Storage CLI\\"\\ndescription: \\"A storage and order system for music media | Winter 2022 Data Structures Course Project\\"\\ntags: [\\"Algorithms\\"]\\ngithub: \\"https://github.com/bencejdanko/CourseProject\\"\\npubDate: 2022-11-11\\n---","/content/projects/network-rails-kafka.md":"---\\ntitle: Realtime Analysis of UK Railway Metrics\\ndescription: >-\\n  This a Flink-Kafka stack and pipeline setup for analyzing the Network Rails\\n  feed.\\ntags:\\n  - Big Data\\n  - Kafka\\n  - Flink\\n  - JuiceFS\\ngithub: 'https://github.com/bencejdanko/network-rails-flink-kafka'\\npubDate: 2025-05-31T00:00:00.000Z\\n---\\n\\n- Architected a real-time streaming pipeline to ingest and process the Network Rail public feed, utilizing a Dockerized Kafka and Flink stack for distributed data handling.\\n- Implemented high-performance storage orchestration using JuiceFS to sink raw XML streams into S3 (MinIO), enabling scalable, persistent data lake storage for downstream analytics.\\n- Developed complex streaming logic in Java and Python, including multi-topic stream joins, Locality-Sensitive Hashing (LSH) for similarity detection, and Bloom filters for efficient membership testing.\\n- Ensured data privacy and integrity by implementing Differential Privacy (DP) counting jobs and robust error-handling for high-throughput messaging.\\n- Automated deployment and lifecycle management via custom shell scripts and Docker Compose, streamlining the build, submission, and monitoring of Flink jobs.","/content/projects/openweather-dbt.md":"---\\ntitle: OpenWeather Big Data Pipeline\\ndescription: >-\\n  A data pipeline project that utilizes Big Data technologies such as Apache\\n  Airflow, dbt, and Snowflake to extract, transform, analyze and store weather\\n  data from OpenWeather API.\\ntags:\\n  - Big Data\\n  - Apache Airflow\\n  - dbt\\n  - Snowflake\\ngithub: 'https://github.com/bencejdanko/openweather-airflow-dbt'\\npubDate: 2024-9-13\\n---\\n\\n- Developed ETL analytics utilizing Apache Airflow orchestrating scheduled historical streams daily.\\n- Designed dbt transformations auditing air quality variables determining correlation indices efficiently.\\n","/content/projects/pocketbase-api-template.md":"---\\ntitle: Pocketbase API Template\\ndescription: >-\\n  This repository serves as a template and guide for setting up a\\n  PocketBase-powered backend, demonstrating how to develop APIs using both\\n  JavaScript and Golang while leveraging PocketBase’s built-in features.\\ntags:\\n  - Backend Development\\n  - Pocketbase\\n  - Golang\\n  - Javascript\\ngithub: 'https://github.com/bencejdanko/pocketbase-api-template'\\npubDate: 2025-1-11\\n---\\n\\n- Designed multi-tenant extension skeletons Injecting LLM analysis support setups natively.\\n","/content/projects/retro-crt-emulator.md":"---\\ntitle: Retro CRT Emulator Web Terminal\\ndescription: >-\\n  Implementation of an old CRT screen with exaggerated effects (Phosphor\\n  persistence, glow, flickering, rastar, beam sweep)\\ntags:\\n  - Web Development\\n  - Javascript\\n  - HTML\\n  - CSS\\ngithub: 'https://github.com/bencejdanko/labienus.dev'\\npubDate: 8-16-2023\\n---\\n\\n- Implemented an exaggerated vintage CRT output displaying shadow phosphors filters natively.\\n","/content/projects/slt.md":"---\\ntitle: Video-to-Text Sign Language Translation\\ndescription: >-\\n  Video-to-text sign language translation with a modified SAM-3D-Body library\\n  fork, evaluated on How2Sign\\ntags:\\n  - Deep Learning\\n  - Video Segmentation\\n  - DinoV3\\n  - SAM\\n  - PyTorch\\ngithub: 'https://github.com/bencejdanko/sign-language-translation'\\npubDate: 3-18-2026\\nadditionalLinks:\\n  - label: \\"Hugging Face Dataset\\"\\n    url: \\"https://huggingface.co/datasets/bdanko/how2sign-rgb-front-clips\\"\\n  - label: \\"Technical Report\\"\\n    url: \\"/bencejdanko/slt\\"\\n---\\n\\n- Developed an end-to-end ASL-to-Text translation pipeline utilizing a sliding-window CNN and a fine-tuned M2M100 multilingual decoder to process continuous American Sign Language video.\\n- Engineered multi-modal feature representations by fusing DinoV3 visual embeddings with SAM-3D body coordinates from Meta MHR, improving spatial-temporal context for the model.\\n- Evaluated translation quality across diverse benchmarks, achieving measurable performance gains validated by BLEU, METEOR, and chrF metrics.","/content/projects/solitaire-scrabble.md":"---\\ntitle: Solitaire Scrabble\\ndescription: >-\\n  A casual vocabulary game. A dynamic programming algorithm analyzes the optimal\\n  word sequences.\\ntags:\\n  - Algorithms\\n  - Python\\n  - Flask\\ngithub: 'https://github.com/bencejdanko/solitaire-scrabble'\\npubDate: 2024-1-11\\n---\\n\\n- Designed Scoring layouts utilizing state indices maximizing phrase solver indexes efficiently.\\n","/content/projects/solona-graduation-ml.md":"---\\ntitle: Solona Graduation Kaggle Competition\\ndescription: >-\\n  This repository contains Google Colab notebooks and modeling code for the\\n  Solana Skill Sprint: Memecoin Graduation competition (ended April 30th, 2025).\\ntags:\\n  - Machine Learning\\n  - Python\\ngithub: 'https://github.com/bencejdanko/solona-graduation-ml'\\npubDate: 2025-05-30T00:00:00.000Z\\n---\\n\\n- Conducted high-accuracy diagnostics analyzing SHAP indexes diagnosing feature shifts reliably.\\n","/content/projects/spotify-with-lyrics-generator.md":"---\\ntitle: Spotify with Lyrics Dataset Generator\\ndescription: >-\\n  A set of helper scripts to combine song attributes provided by Spotify to\\n  lyrics sourcable on LyricGenius.\\ntags:\\n  - Big Data\\n  - Python\\ngithub: 'https://github.com/bencejdanko/spotify-with-lyrics-dataset-generator'\\npubDate: 2024-10-15T00:00:00.000Z\\n---\\n\\n- Formulated Scraping drivers merging lyric mappings effectively.\\n","/content/projects/text-stream-simulation.md":"---\\ntitle: Big Data Text Stream Simulation\\ndescription: >-\\n  A simulation of n number of incoming concurrent textual streams. Inputs are\\n  stored and parsed in an ML pipeline in real time. Meant to simulate LLM\\n  streams.\\ntags:\\n  - Big Data\\n  - Kafka\\n  - Spark\\n  - Hive\\ngithub: 'https://github.com/bencejdanko/text-streams-kafka-spark-hive'\\npubDate: 2025-03-06T00:00:00.000Z\\n---\\n\\n- Architected modular simulation servers digesting streamed streams using K-Means classification indices safely.\\n","/content/projects/thorn.md":"---\\ntitle: 'Thorn, Agentic Research'\\ndescription: >-\\n  Thorn knows everything! Automated agentic research intelligence system.\\n  Discovers papers on arXiv, builds a self-growing knowledge graph, tracks\\n  trends and novelty, generates polished markdown digests, and pushes summaries\\n  to Discord.\\ntags:\\n  - Agents\\n  - Python\\n  - LangGraph\\ngithub: 'https://github.com/bencejdanko/thorn'\\npubDate: 2026-02-28T00:00:00.000Z\\n---\\n\\n- Architected an autonomous agentic research system that automates the end-to-end scientific discovery process: from arXiv ingestion and PDF parsing to trend analysis and Discord delivery.\\n- Engineered a multi-agent pipeline utilizing a Planner Agent, Extractor Agent, Critic Agent, and Publisher Agent.\\n- Developed a self-growing Research Knowledge Graph using SQLite (WAL mode) to map complex relationships between papers.\\n- Implemented section-aware document processing using PyMuPDF and OpenAI embeddings.","/content/projects/tldraw-astro.md":"---\\ntitle: \\"@bencejdanko/tldraw-astro\\"\\ndescription: \\"Integration for rendering tldraw diagrams in Astro projects using standard Markdown directives, released on node package manager (npm)\\"\\ntags: [\\"Web Development\\"]\\ngithub: \\"https://github.com/bencejdanko/tldraw-astro\\"\\npubDate: 2026-02-26\\n---\\n\\n- Astro markdown integration for rendering tldraw diagrams in Astro projects \\n- Deployed on the \`npm\` software package manager for public distribution","/content/authors/bence-danko.yaml":"name: Bence Jordan Dankó\\ndepartment: dept. of applied data science\\norganization: San Jose State University\\ncity: San Jose\\ncountry: USA\\nemail: bence.danko@sjsu.edu\\norcid: 0009-0000-5824-9296\\nshortBio: > \\n  I am a graduate student at SJSU. My studies are focused on\\n  developing deep learning and generative AI models, and quantizing \\n  and deploying to hardware accelerators for specialized domains,\\n  such as computer vision, information processing\\n  and generative QA. I've used accelerators such as the\\n  the Mobilint MLA100 NPU, the Nvidia AGX Orin, NuMicro® M55M1. I\\n  am currently interested in FPGA development on the Zybo Z7 and deploying \\n  accelerated ternary and binary weighted transformer architecture. I have\\n  a background in traditional computer science, big data technologies,\\n  web development, and devops. In my spare time, I enjoy photography,\\n  fitness culture, and creating music.\\n\\n\\nphone: \\"+1 (408) 872-2416\\"\\nwebsite: https://bencejdanko.github.io\\ngithub: https://github.com/bencejdanko\\nx: https://x.com/bencejdanko\\nlinkedin: https://lin
